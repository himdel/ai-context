// Repo visual identity — deterministic icon + color per repo path
var RepoIdentity = {
  _cache: {},
  _hash: function(str) {
    var h = 0x811c9dc5;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 0x01000193);
    }
    return h >>> 0;
  },
  _icon: function(hash, hue, size) {
    var color = 'hsl(' + hue + ',55%,45%)';
    var bg = 'hsl(' + hue + ',30%,90%)';
    var bits = hash >>> 8;
    var rects = '';
    for (var r = 0; r < 5; r++) {
      for (var c = 0; c < 3; c++) {
        if ((bits >> (r * 3 + c)) & 1) {
          rects += '<rect x="' + c + '" y="' + r + '" width="1" height="1" fill="' + color + '"/>';
          if (c < 2) rects += '<rect x="' + (4 - c) + '" y="' + r + '" width="1" height="1" fill="' + color + '"/>';
        }
      }
    }
    return '<span class="repo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5 5" width="' + size + '" height="' + size + '" style="background:' + bg + ';border-radius:2px">' + rects + '</svg></span>';
  },
  get: function(repoPath) {
    if (!repoPath) return null;
    if (this._cache[repoPath]) return this._cache[repoPath];
    var hash = this._hash(repoPath);
    var hue = (hash & 0xFF) * 360 / 256;
    var id = {
      color: 'hsl(' + hue + ',55%,45%)',
      colorLight: 'hsl(' + hue + ',40%,93%)',
      colorBorder: 'hsl(' + hue + ',55%,55%)',
      colorText: 'hsl(' + hue + ',50%,35%)',
      iconSm: this._icon(hash, hue, 16),
      iconMd: this._icon(hash, hue, 24),
    };
    this._cache[repoPath] = id;
    return id;
  }
};

var _depsCache = {};
function loadRichDeps(lang) {
  var key = (lang === 'graphviz') ? 'dot' : lang;
  if (!_depsCache[key]) {
    if (key === 'mermaid') {
      _depsCache[key] = loadScript('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js')
        .then(function() { mermaid.initialize({ startOnLoad: false, theme: 'default' }); });
    } else if (key === 'math') {
      _depsCache[key] = Promise.all([
        loadCSS('https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css'),
        loadScript('https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js'),
      ]);
    } else if (key === 'dot') {
      _depsCache[key] = loadScript('https://cdn.jsdelivr.net/npm/@viz-js/viz@3/lib/viz-standalone.js');
    } else if (key === 'vega-lite') {
      _depsCache[key] = loadScript('https://cdn.jsdelivr.net/npm/vega@5')
        .then(function() { return loadScript('https://cdn.jsdelivr.net/npm/vega-lite@5'); })
        .then(function() { return loadScript('https://cdn.jsdelivr.net/npm/vega-embed@6'); });
    } else if (key === 'geojson') {
      _depsCache[key] = Promise.all([
        loadCSS('https://cdn.jsdelivr.net/npm/leaflet@1/dist/leaflet.css'),
        loadScript('https://cdn.jsdelivr.net/npm/leaflet@1/dist/leaflet.js'),
      ]);
    } else if (key === 'abc') {
      _depsCache[key] = Promise.all([
        loadScript('https://cdn.jsdelivr.net/npm/abcjs@6/dist/abcjs-basic-min.js'),
        loadCSS('https://cdn.jsdelivr.net/npm/abcjs@6/abcjs-audio.css'),
      ]);
    } else if (key === 'markmap') {
      _depsCache[key] = loadScript('https://cdn.jsdelivr.net/npm/d3@7')
        .then(function() { return loadScript('https://cdn.jsdelivr.net/npm/markmap-lib@0.18/dist/browser/index.iife.js'); })
        .then(function() { return loadScript('https://cdn.jsdelivr.net/npm/markmap-view@0.18/dist/browser/index.js'); });
    } else if (key === 'plantuml') {
      _depsCache[key] = loadScript('https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js');
    } else {
      _depsCache[key] = Promise.resolve();
    }
  }
  return _depsCache[key];
}

var richBlockCounter = 0;
var richLangs = ['mermaid', 'math', 'dot', 'graphviz', 'vega-lite', 'geojson', 'abc', 'markmap', 'plantuml'];

marked.use({
  renderer: {
    code: function(token) {
      var lang = (token.lang || '').toLowerCase();
      if (richLangs.indexOf(lang) === -1) return false;
      var id = 'rich-' + (richBlockCounter++);
      var escaped = token.text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return '<div class="rich-container">' +
        '<div class="rich-toolbar"><button class="rich-toggle" title="Toggle source">Source</button></div>' +
        '<div class="rich-rendered" data-rich-id="' + id + '" data-rich-lang="' + lang + '" data-rich-src="' + encodeURIComponent(token.text) + '"></div>' +
        '<pre class="rich-source" style="display:none"><code>' + escaped + '</code></pre>' +
        '</div>';
    }
  }
});

function renderRichBlocks() {
  document.querySelectorAll('.rich-rendered[data-rich-src]:not(.rich-done)').forEach(function(el) {
    el.classList.add('rich-done');
    var src = decodeURIComponent(el.getAttribute('data-rich-src'));
    var id = el.getAttribute('data-rich-id');
    var lang = el.getAttribute('data-rich-lang');

    loadRichDeps(lang).then(function() {
      if (lang === 'mermaid') {
        mermaid.render(id, src).then(function(result) {
          el.innerHTML = result.svg;
        }).catch(function() {
          el.innerHTML = '<em style="color:#999">Failed to render diagram</em>';
        });

      } else if (lang === 'math') {
        try {
          katex.render(src.trim(), el, { displayMode: true, throwOnError: false });
        } catch(e) {
          el.innerHTML = '<em style="color:#999">Failed to render math</em>';
        }

      } else if (lang === 'dot' || lang === 'graphviz') {
        Viz.instance().then(function(viz) {
          try {
            el.innerHTML = viz.renderSVGElement(src).outerHTML;
          } catch(e) {
            el.innerHTML = '<em style="color:#999">Failed to render graph</em>';
          }
        }).catch(function() {
          el.innerHTML = '<em style="color:#999">Failed to render graph</em>';
        });

      } else if (lang === 'vega-lite') {
        try {
          var spec = JSON.parse(src);
          vegaEmbed(el, spec, { actions: false }).catch(function() {
            el.innerHTML = '<em style="color:#999">Failed to render chart</em>';
          });
        } catch(e) {
          el.innerHTML = '<em style="color:#999">Invalid Vega-Lite JSON</em>';
        }

      } else if (lang === 'geojson') {
        try {
          var geojson = JSON.parse(src);
          var mapDiv = document.createElement('div');
          mapDiv.className = 'rich-map';
          el.appendChild(mapDiv);
          var map = L.map(mapDiv);
          L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
          }).addTo(map);
          var layer = L.geoJSON(geojson).addTo(map);
          var bounds = layer.getBounds();
          map.fitBounds(bounds, { padding: [20, 20] });
          var ResetControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function() {
              var btn = L.DomUtil.create('a', 'leaflet-control-zoom-reset');
              btn.innerHTML = '&#x21ba;';
              btn.title = 'Reset view';
              btn.href = '#';
              btn.setAttribute('role', 'button');
              L.DomEvent.disableClickPropagation(btn);
              L.DomEvent.on(btn, 'click', function(e) {
                L.DomEvent.preventDefault(e);
                map.fitBounds(bounds, { padding: [20, 20] });
              });
              return btn;
            },
          });
          map.addControl(new ResetControl());
        } catch(e) {
          el.innerHTML = '<em style="color:#999">Failed to render map</em>';
        }

      } else if (lang === 'abc') {
        var abcDiv = document.createElement('div');
        abcDiv.className = 'abcjs-container';
        el.appendChild(abcDiv);
        var audioDiv = document.createElement('div');
        audioDiv.className = 'abcjs-audio';
        el.appendChild(audioDiv);
        try {
          var visualObj = ABCJS.renderAbc(abcDiv, src);
          if (ABCJS.synth && ABCJS.synth.supportsAudio()) {
            var synthControl = new ABCJS.synth.SynthController();
            synthControl.load(audioDiv, null, {
              displayPlay: true,
              displayProgress: true,
              displayRestart: true,
            });
            synthControl.setTune(visualObj[0], false);
          }
        } catch(e) {
          el.innerHTML = '<em style="color:#999">Failed to render notation</em>';
        }

      } else if (lang === 'markmap') {
        try {
          var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('style', 'width:100%;height:300px');
          el.appendChild(svg);
          var transformer = new markmap.Transformer();
          var parsed = transformer.transform(src);
          markmap.Markmap.create(svg, null, parsed.root);
        } catch(e) {
          el.innerHTML = '<em style="color:#999">Failed to render mind map</em>';
        }

      } else if (lang === 'plantuml') {
        var encoded = plantumlEncode(src);
        var img = document.createElement('img');
        img.src = 'https://www.plantuml.com/plantuml/svg/' + encoded;
        img.alt = 'PlantUML diagram';
        img.onerror = function() {
          el.innerHTML = '<em style="color:#999">Failed to render PlantUML diagram</em>';
        };
        el.appendChild(img);
      }
    }).catch(function() {
      el.innerHTML = '<em style="color:#999">Failed to load rendering library</em>';
    });
  });
}

function plantumlEncode(text) {
  function encode6bit(b) {
    if (b < 10) return String.fromCharCode(48 + b);
    b -= 10;
    if (b < 26) return String.fromCharCode(65 + b);
    b -= 26;
    if (b < 26) return String.fromCharCode(97 + b);
    b -= 26;
    if (b === 0) return '-';
    if (b === 1) return '_';
    return '?';
  }
  function append3bytes(b1, b2, b3) {
    var c1 = b1 >> 2;
    var c2 = ((b1 & 0x3) << 4) | (b2 >> 4);
    var c3 = ((b2 & 0xF) << 2) | (b3 >> 6);
    var c4 = b3 & 0x3F;
    return encode6bit(c1 & 0x3F) + encode6bit(c2 & 0x3F) + encode6bit(c3 & 0x3F) + encode6bit(c4 & 0x3F);
  }
  var data = new TextEncoder().encode(text);
  var deflated = new Uint8Array(pako.deflateRaw(data));
  var r = '';
  for (var i = 0; i < deflated.length; i += 3) {
    if (i + 2 === deflated.length) {
      r += append3bytes(deflated[i], deflated[i + 1], 0);
    } else if (i + 1 === deflated.length) {
      r += append3bytes(deflated[i], 0, 0);
    } else {
      r += append3bytes(deflated[i], deflated[i + 1], deflated[i + 2]);
    }
  }
  return r;
}

// Load autolink patterns and register as a marked extension
fetch('/api/autolinks/')
  .then(r => r.json())
  .then(autolinks => {
    if (!autolinks.length) return;
    const reEscape = s => s.replace(/[.*+?^${}()|[\]\\\/]/g, '\\$&');
    const extensions = autolinks.map(al => {
      const name = 'autolink-' + al.prefix;
      const pre = reEscape(al.prefix);
      return {
        name: name,
        level: 'inline',
        start: function(src) { return src.match(new RegExp(pre))?.index; },
        tokenizer: function(src) {
          const match = src.match(new RegExp('^(' + pre + '(\\d+))'));
          if (match) {
            return { type: name, raw: match[0], text: match[1], id: match[2], url: al.url.replace('{id}', match[2]) };
          }
        },
        renderer: function(token) {
          return '<a href="' + esc(token.url) + '" target="_blank" rel="noopener noreferrer">' + esc(token.text) + '</a>';
        },
      };
    });
    marked.use({ extensions: extensions });
  });

function showCreateSessionForm(pushHistory) {
  setActiveScreen({ activeNewScreen: 'conversation' });
  if (pushHistory !== false) {
    history.pushState(null, '', '/conversations/new');
  }
  mainEl.innerHTML =
    '<div class="new-session-form">' +
      '<h3 style="margin-bottom:12px">New session</h3>' +
      '<textarea id="ns-prompt" placeholder="Enter your prompt..."></textarea>' +
      '<input type="text" id="ns-cwd" placeholder="Working directory (optional)">' +
      '<div class="cwd-buttons" id="ns-cwds"></div>' +
      '<button id="ns-launch">Launch</button>' +
      '<span class="form-status" id="ns-status"></span>' +
    '</div>';
  document.getElementById('ns-prompt').focus();

  // Populate recent cwds from conversations
  fetch('/api/conversations/')
    .then(r => r.json())
    .then(conversations => {
      var seen = {};
      var cwds = [];
      conversations.forEach(c => {
        var p = c.project;
        if (p && !seen[p]) {
          seen[p] = true;
          cwds.push(p);
        }
      });
      var container = document.getElementById('ns-cwds');
      if (!container) return;
      cwds.forEach(cwd => {
        var btn = document.createElement('button');
        btn.textContent = cwd.replace(/^\/home\/[^/]+\//, '~/');
        btn.title = cwd;
        btn.onclick = function() { document.getElementById('ns-cwd').value = cwd; };
        container.appendChild(btn);
      });
    });

  document.getElementById('ns-launch').onclick = function() {
    var prompt = document.getElementById('ns-prompt').value.trim();
    document.getElementById('ns-status').textContent = 'Launching...';
    fetch('/api/sessions/new/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: prompt, cwd: document.getElementById('ns-cwd').value.trim()})
    })
    .then(r => r.json().then(d => ({ok: r.ok, data: d})))
    .then(({ok, data}) => {
      var statusEl = document.getElementById('ns-status');
      if (!ok) { statusEl.textContent = data.error || 'Error'; return; }
      statusEl.textContent = 'Launched, waiting for session...';
      // Poll for the new conversation to appear
      var knownIds = new Set();
      document.querySelectorAll('.conversation-item').forEach(el => knownIds.add(el.dataset.id));
      var attempts = 0;
      var poll = setInterval(function() {
        attempts++;
        if (attempts > 30) { clearInterval(poll); statusEl.textContent = 'Launched (session not yet visible)'; loadSidebar(); return; }
        fetch('/api/conversations/')
          .then(r => r.json())
          .then(conversations => {
            var newConv = conversations.find(c => !knownIds.has(c.id));
            if (newConv) {
              clearInterval(poll);
              loadSidebar();
              loadConversation(newConv.id);
            }
          });
      }, 1000);
    });
  };
}

function loadPlan(planId, pushHistory) {
  setActiveScreen({ activePlanId: planId });
  if (pushHistory !== false) {
    history.pushState({planId: planId}, '', '/plans/' + planId);
  }
  document.querySelectorAll('.plan-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === planId);
  });
  if (!planListEl.children.length) loadPlansSidebar();
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/plans/' + planId + '/')
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        mainEl.innerHTML = '<div class="empty">' + esc(data.error) + '</div>';
        return;
      }

      var renderPlan = function() {
        mainEl.innerHTML = '';

        var toolbar = document.createElement('div');
        toolbar.className = 'conversation-toolbar';
        toolbar.innerHTML = '<span class="header-btns"><span class="close-conv" title="Close">&times;</span></span>';
        toolbar.querySelector('.close-conv').onclick = function() { closeConversation('plans'); };
        mainEl.appendChild(toolbar);

        var header = document.createElement('div');
        header.className = 'conversation-header';
        var prid = data.cwd ? RepoIdentity.get(data.cwd) : null;
        if (prid) {
          header.style.borderLeft = '3px solid ' + prid.colorBorder;
          header.style.paddingLeft = '12px';
        }
        var parts = [];

        var project = data.cwd ? data.cwd.replace(/^\/home\/[^/]+\//, '~/') : '';
        if (project && currentForgeRepo) {
          parts.push('<span>' + (prid ? prid.iconSm : '') + '<a href="' + esc(forgeRepoUrl(currentForgeRepo)) + '" target="_blank" rel="noopener noreferrer">' + esc(project) + '</a></span>');
        } else if (project) {
          parts.push('<span>' + (prid ? prid.iconSm : '') + esc(project) + '</span>');
        }
        if (data.branch) {
          if (currentForgeOrigin) {
            parts.push('<span>branch: <a href="' + esc(forgeBranchUrl(currentForgeOrigin, data.branch)) + '" target="_blank" rel="noopener noreferrer">' + esc(data.branch) + '</a></span>');
          } else {
            parts.push('<span>branch: ' + esc(data.branch) + '</span>');
          }
        }
        if (currentPR) {
          var prLabel = currentForgeRepo && currentForgeRepo.type === 'gitlab' ? 'MR' : 'PR';
          var prPrefix = currentForgeRepo && currentForgeRepo.type === 'gitlab' ? '!' : '#';
          parts.push('<span>' + prLabel + ': <a href="' + esc(currentPR.url) + '" target="_blank" rel="noopener noreferrer">' + prPrefix + currentPR.number + '</a>' + (currentPR.state === 'MERGED' ? ' (merged)' : currentPR.state === 'CLOSED' ? ' (closed)' : '') + '</span>');
        }
        if (data.conversation_id) {
          parts.push('<span>conversation: <a href="/conversations/' + esc(data.conversation_id) + '" style="color:#4338ca">' + esc(data.conversation_id.substring(0, 8)) + '...</a></span>');
        }
        header.innerHTML = parts.join('');
        mainEl.appendChild(header);

        var view = document.createElement('div');
        view.className = 'plan-detail-view';

        var actions = document.createElement('div');
        actions.className = 'plan-actions';

        var execBtn = document.createElement('button');
        execBtn.textContent = 'Execute plan';
        execBtn.onclick = function() {
          execBtn.textContent = '...';
          fetch('/api/plans/' + planId + '/execute/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cwd: data.cwd || ''})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(function(resp) {
            execBtn.textContent = resp.ok ? 'Launched' : 'Error';
            setTimeout(function() { execBtn.textContent = 'Execute plan'; }, 2000);
          });
        };
        actions.appendChild(execBtn);
        view.appendChild(actions);

        var planBlock = document.createElement('div');
        planBlock.className = 'block plan-block';
        planBlock.innerHTML =
          '<div class="plan-header">' + esc(data.title) + '</div>' +
          '<div class="plan-content">' + renderMarkdown(data.content) + '</div>';
        view.appendChild(planBlock);

        mainEl.appendChild(view);
        renderRichBlocks();
        mainEl.scrollTop = 0;
        mainEl.focus();
      };

      if (data.cwd) {
        fetch('/api/github-repo/?path=' + encodeURIComponent(data.cwd) + '&branch=' + encodeURIComponent(data.branch || ''))
          .then(r => r.json())
          .then(gh => { setForgeAutolink(gh); renderPlan(); })
          .catch(() => { setForgeAutolink(null); renderPlan(); });
      } else {
        setForgeAutolink(null);
        renderPlan();
      }
    });
}

function startFollowing(id, msgCount) {
  stopFollowing();
  followConvId = id;
  renderedMsgCount = msgCount;
  followInterval = setInterval(pollForUpdates, 5000);
}

function stopFollowing() {
  if (followInterval) clearInterval(followInterval);
  followInterval = null;
  followConvId = null;
  renderedMsgCount = 0;
}

function pollForUpdates() {
  if (document.hidden) return;
  if (!followConvId || activeId !== followConvId) {
    stopFollowing();
    return;
  }
  if (Date.now() - lastSidebarLoad > 20000) loadSidebar();

  fetch('/api/conversations/' + followConvId + '/')
    .then(r => r.json())
    .then(data => {
      if (activeId !== followConvId) return;
      if (data.messages && data.messages.length > renderedMsgCount) {
        var wasNear = isNearBottom(mainEl);
        var newMessages = data.messages.slice(renderedMsgCount);
        newMessages.forEach(function(m, idx) {
          var prevMsg = idx === 0 ? data.messages[renderedMsgCount - 1] : newMessages[idx - 1];
          if (isSkillPrompt(m, prevMsg)) {
            var msgDivs = mainEl.querySelectorAll('.message');
            var prevDiv = msgDivs[msgDivs.length - 1];
            if (prevDiv) prevDiv.innerHTML += renderSkillPrompt(m);
            return;
          }
          var div = document.createElement('div');
          div.className = 'message new-msg ' + m.role;
          div._messageData = m;
          div.innerHTML = '<div class="role"><span>' + esc(m.role) + '</span><span>' + (m.timestamp ? '<span class="msg-time">' + esc(formatTime(m.timestamp)) + '</span>' : '') + '<span class="copy-msg" title="Copy as markdown">&#x2398;</span></span></div>';
          m.content.forEach(function(block) {
            div.innerHTML += renderBlock(block);
          });
          mainEl.appendChild(div);
        });
        renderedMsgCount = data.messages.length;
        renderRichBlocks();
        if (wasNear) mainEl.scrollTop = mainEl.scrollHeight;
      }
      currentMessages = data.messages;
      updateStatusBar(currentMessages);
      if (!data.active) {
        stopFollowing();
        var indicator = mainEl.querySelector('.follow-indicator');
        if (indicator) indicator.remove();
      }
    })
    .catch(function() {});
}

function closeConversation(tab) {
  currentMessages = null;
  if (tab) homeTab = tab;
  showHomeScreen();
}

function updateFavicon(count) {
  var canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  var ctx = canvas.getContext('2d');

  // Background circle
  ctx.beginPath();
  ctx.arc(32, 32, 30, 0, 2 * Math.PI);
  ctx.fillStyle = count > 0 ? '#16a34a' : '#999';
  ctx.fill();

  // Number text
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (count > 99 ? '28' : count > 9 ? '32' : '38') + 'px system-ui, sans-serif';
  ctx.fillText(count > 99 ? '99+' : String(count), 32, 34);

  var link = document.querySelector('link[rel="icon"]');
  if (!link) {
    link = document.createElement('link');
    link.rel = 'icon';
    document.head.appendChild(link);
  }
  link.type = 'image/png';
  link.href = canvas.toDataURL('image/png');
}

function showSkillsHome() {
  fetch('/api/skills/')
    .then(r => r.json())
    .then(skillsList => {
      // Group by scope: global first, then per-repo
      var groups = {};
      var groupOrder = [];
      skillsList.forEach(s => {
        if (!groups[s.scope]) {
          groups[s.scope] = [];
          groupOrder.push(s.scope);
        }
        groups[s.scope].push(s);
      });

      // Put global first
      groupOrder.sort(function(a, b) {
        if (a === 'global') return -1;
        if (b === 'global') return 1;
        return a.localeCompare(b);
      });

      var container = document.getElementById('home-cols');
      if (!container) return;

      groupOrder.forEach(function(scope) {
        var skills = groups[scope];
        var isGlobal = scope === 'global';
        var short = isGlobal ? 'Global' : scope.replace(/^\/home\/[^/]+\//, '~/');
        var name = isGlobal ? 'Global' : short.split('/').pop();

        var col = document.createElement('div');
        col.className = 'home-column';
        var skrid2 = !isGlobal ? RepoIdentity.get(scope) : null;

        var header = document.createElement('div');
        header.className = 'home-column-header';
        if (skrid2) {
          header.style.background = skrid2.colorLight;
          col.style.borderTop = '3px solid ' + skrid2.colorBorder;
        }
        var nameDiv = document.createElement('div');
        nameDiv.innerHTML = (skrid2 ? skrid2.iconMd : '') + esc(name) + (!isGlobal ? '<span class="col-path">' + esc(short) + '</span>' : '');
        if (!isGlobal) nameDiv.title = scope;
        header.appendChild(nameDiv);
        col.appendChild(header);

        var list = document.createElement('div');
        list.className = 'home-conv-list';

        skills.forEach(function(s) {
          var item = document.createElement('div');
          item.className = 'home-conv-item';
          var meta = '<div class="conv-meta">';
          if (s.modified) meta += '<span>' + esc(formatDate(s.modified)) + '</span>';
          meta += '</div>';
          var homeKindBadge = s.kind === 'skill' ? '<span class="skill-kind-badge kind-skill">skill</span>' : '<span class="skill-kind-badge">cmd</span>';
          item.innerHTML = meta + '<div>/' + esc(s.name) + homeKindBadge + '</div>';
          item.onclick = function() { loadSkill(s.id); };
          list.appendChild(item);
        });

        col.appendChild(list);
        container.appendChild(col);
      });
    });
}

function loadSkill(skillId, pushHistory) {
  setActiveScreen({ activeSkillId: skillId });
  document.querySelectorAll('.skill-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === skillId);
  });
  if (!skillListEl.children.length) loadSkillsSidebar();
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/skills/' + skillId + '/')
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        mainEl.innerHTML = '<div class="empty">' + esc(data.error) + '</div>';
        return;
      }
      if (pushHistory !== false) {
        history.pushState({skillId: skillId}, '', skillDisplayUrl(data.scope, data.name));
      }

      var renderSkillView = function() {
        mainEl.innerHTML = '';

        var toolbar = document.createElement('div');
        toolbar.className = 'conversation-toolbar';
        toolbar.innerHTML = '<span class="header-btns"><span class="close-conv" title="Close">&times;</span></span>';
        toolbar.querySelector('.close-conv').onclick = function() { closeConversation('skills'); };
        mainEl.appendChild(toolbar);

        var header = document.createElement('div');
        header.className = 'conversation-header';
        header.style.borderLeft = '3px solid #0d9488';
        header.style.paddingLeft = '12px';
        var scopeLabel = data.scope === 'global' ? 'Global' : data.scope.replace(/^\/home\/[^/]+\//, '~/');
        var detailKindBadge = data.kind === 'skill' ? '<span class="skill-kind-badge kind-skill">skill</span>' : '<span class="skill-kind-badge">cmd</span>';
        header.innerHTML = '<span>/' + esc(data.name) + detailKindBadge + '</span><span>' + esc(scopeLabel) + '</span><span style="font-family:monospace;font-size:11px">' + esc(data.path) + '</span>';
        mainEl.appendChild(header);

        var view = document.createElement('div');
        view.className = 'skill-detail-view';

        var actions = document.createElement('div');
        actions.className = 'skill-actions';

        var editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.onclick = function() {
          contentBlock.innerHTML = '';
          var textarea = document.createElement('textarea');
          textarea.className = 'skill-edit-area';
          textarea.value = data.content;
          contentBlock.appendChild(textarea);

          actions.innerHTML = '';
          var saveBtn = document.createElement('button');
          saveBtn.textContent = 'Save';
          saveBtn.onclick = function() {
            saveBtn.textContent = '...';
            fetch('/api/skills/' + skillId + '/', {
              method: 'PUT',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({content: textarea.value})
            })
            .then(r => r.json().then(d => ({ok: r.ok, data: d})))
            .then(function(resp) {
              if (resp.ok) {
                loadSkill(skillId, false);
              } else {
                saveBtn.textContent = 'Error';
                setTimeout(function() { saveBtn.textContent = 'Save'; }, 2000);
              }
            });
          };
          actions.appendChild(saveBtn);

          var cancelBtn = document.createElement('button');
          cancelBtn.textContent = 'Cancel';
          cancelBtn.onclick = function() { loadSkill(skillId, false); };
          actions.appendChild(cancelBtn);
        };
        actions.appendChild(editBtn);

        var editorBtn = document.createElement('button');
        editorBtn.textContent = '$EDITOR';
        editorBtn.onclick = function() {
          openInEditor(data.path);
        };
        actions.appendChild(editorBtn);

        var deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.style.color = '#dc2626';
        deleteBtn.style.borderColor = '#fca5a5';
        deleteBtn.onclick = function() {
          if (!confirm('Delete skill /' + data.name + '?')) return;
          fetch('/api/skills/' + skillId + '/', {method: 'DELETE'})
            .then(function() {
              loadSkillsSidebar();
              closeConversation('skills');
            });
        };
        actions.appendChild(deleteBtn);

        var runWrap = document.createElement('div');
        runWrap.className = 'run-dropdown';
        var runBtn = document.createElement('button');
        runBtn.textContent = 'Run';
        if (data.scope === 'global') {
          runBtn.classList.add('has-dropdown');
          var runPanel = document.createElement('div');
          runPanel.className = 'run-dropdown-panel';
          runBtn.onclick = function() {
            if (runPanel.classList.contains('open')) {
              runPanel.classList.remove('open');
              return;
            }
            runPanel.innerHTML = '<button disabled style="color:#aaa">Loading...</button>';
            runPanel.classList.add('open');
            fetch('/api/conversations/')
              .then(r => r.json())
              .then(conversations => {
                var seen = {};
                var cwds = [];
                conversations.forEach(c => {
                  var p = c.project;
                  if (p && !seen[p]) {
                    seen[p] = true;
                    cwds.push(p);
                  }
                });
                runPanel.innerHTML = '';
                if (!cwds.length) {
                  runPanel.innerHTML = '<button disabled style="color:#aaa">No repos found</button>';
                  return;
                }
                cwds.forEach(cwd => {
                  var btn = document.createElement('button');
                  btn.textContent = cwd.replace(/^\/home\/[^/]+\//, '~/');
                  btn.title = cwd;
                  btn.onclick = function() {
                    runPanel.classList.remove('open');
                    runBtn.textContent = '...';
                    fetch('/api/sessions/new/', {
                      method: 'POST',
                      headers: {'Content-Type': 'application/json'},
                      body: JSON.stringify({prompt: '/' + data.name, cwd: cwd})
                    })
                    .then(r => r.json().then(d => ({ok: r.ok, data: d})))
                    .then(function(resp) {
                      runBtn.textContent = resp.ok ? 'Launched' : 'Error';
                      runBtn.classList.add('has-dropdown');
                      setTimeout(function() { runBtn.textContent = 'Run'; }, 2000);
                    });
                  };
                  runPanel.appendChild(btn);
                });
              });
          };
          runWrap.appendChild(runBtn);
          runWrap.appendChild(runPanel);
          document.addEventListener('click', function(e) {
            if (!runWrap.contains(e.target)) runPanel.classList.remove('open');
          });
        } else {
          runBtn.onclick = function() {
            runBtn.textContent = '...';
            fetch('/api/sessions/new/', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({prompt: '/' + data.name, cwd: data.scope})
            })
            .then(r => r.json().then(d => ({ok: r.ok, data: d})))
            .then(function(resp) {
              runBtn.textContent = resp.ok ? 'Launched' : 'Error';
              setTimeout(function() { runBtn.textContent = 'Run'; }, 2000);
            });
          };
          runWrap.appendChild(runBtn);
        }
        actions.appendChild(runWrap);

        var cronWrap = document.createElement('div');
        cronWrap.className = 'run-dropdown';
        var cronBtn = document.createElement('button');
        cronBtn.textContent = 'Cron';
        cronBtn.style.cssText = 'border-color:#fda4af;background:#fff1f2;color:#9f1239';
        var cronPanel = document.createElement('div');
        cronPanel.className = 'run-dropdown-panel';
        cronBtn.classList.add('loading');
        fetch('/api/cronjobs/')
          .then(function(r) { return r.json(); })
          .then(function(cronjobs) {
            cronBtn.classList.remove('loading');
            var matches = cronjobs.filter(function(cj) { return cj.skill_name === data.name; });
            if (matches.length === 0) {
              cronBtn.classList.add('has-plus');
              cronBtn.onclick = function() { showCreateCronjobForm(data.name); };
            } else {
              cronBtn.classList.add('has-dropdown');
              cronBtn.onclick = function() {
                if (cronPanel.classList.contains('open')) {
                  cronPanel.classList.remove('open');
                  return;
                }
                cronPanel.innerHTML = '';
                matches.forEach(function(cj) {
                  var btn = document.createElement('button');
                  var short = cj.repo.replace(/^\/home\/[^/]+\//, '~/');
                  btn.textContent = cj.schedule_summary + ' in ' + short;
                  btn.onclick = function() {
                    cronPanel.classList.remove('open');
                    loadCronjob(cj.id);
                  };
                  cronPanel.appendChild(btn);
                });
                var newBtn = document.createElement('button');
                newBtn.textContent = '+ New cronjob';
                newBtn.style.cssText = 'color:#9f1239;font-weight:600';
                newBtn.onclick = function() {
                  cronPanel.classList.remove('open');
                  showCreateCronjobForm(data.name);
                };
                cronPanel.appendChild(newBtn);
                cronPanel.classList.add('open');
              };
            }
          });
        cronWrap.appendChild(cronBtn);
        cronWrap.appendChild(cronPanel);
        document.addEventListener('click', function(e) {
          if (!cronWrap.contains(e.target)) cronPanel.classList.remove('open');
        });
        actions.appendChild(cronWrap);

        view.appendChild(actions);

        var body = data.content;
        var fmMatch = body.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
        if (fmMatch) {
          var fmBlock = document.createElement('dl');
          fmBlock.className = 'skill-frontmatter';
          var fmLines = fmMatch[1].split('\n');
          var currentKey = '';
          var currentVal = '';
          var flush = function() {
            if (!currentKey) return;
            var dt = document.createElement('dt');
            dt.textContent = currentKey;
            var dd = document.createElement('dd');
            dd.textContent = currentVal.trim();
            fmBlock.appendChild(dt);
            fmBlock.appendChild(dd);
          };
          fmLines.forEach(function(line) {
            var kv = line.match(/^([a-zA-Z_-]+)\s*:\s*(.*)$/);
            if (kv && !line.match(/^\s/)) {
              flush();
              currentKey = kv[1];
              currentVal = kv[2].replace(/^>-?\s*$/, '');
            } else {
              currentVal += ' ' + line.trim();
            }
          });
          flush();
          view.appendChild(fmBlock);
          body = fmMatch[2];
        }

        var contentBlock = document.createElement('div');
        contentBlock.className = 'block text';
        contentBlock.innerHTML = renderMarkdown(body);
        view.appendChild(contentBlock);

        var invocSection = document.createElement('div');
        invocSection.className = 'skill-invocations';
        invocSection.innerHTML = '<h3 style="margin:24px 0 8px;font-size:14px;color:#888">Recent invocations</h3><div style="font-size:13px;color:#888">Loading...</div>';
        view.appendChild(invocSection);

        fetch('/api/skills/' + skillId + '/invocations/')
          .then(r => r.json())
          .then(function(invocations) {
            invocSection.innerHTML = '<h3 style="margin:24px 0 8px;font-size:14px;color:#888">Recent invocations</h3>';
            if (!invocations.length) {
              invocSection.innerHTML += '<div style="font-size:13px;color:#888">No invocations found.</div>';
              return;
            }
            var list = document.createElement('div');
            list.className = 'home-conv-list';
            invocations.forEach(function(inv) {
              var item = document.createElement('div');
              item.className = 'home-conv-item';
              item.style.cursor = 'pointer';
              var rid = inv.cwd ? RepoIdentity.get(inv.cwd) : null;
              var short = inv.cwd ? inv.cwd.replace(/^\/home\/[^/]+\//, '~/') : '';
              var ago = timeAgo(inv.timestamp);
              var meta = '<div class="conv-meta">' +
                '<span>' + esc(formatDate(inv.timestamp)) + (ago ? ' (' + esc(ago) + ')' : '') + '</span>' +
                '</div>';
              var repo = '<div style="display:flex;align-items:center;gap:6px">' +
                (rid ? rid.iconSm : '') +
                '<span' + (rid ? ' style="color:' + rid.colorText + '"' : '') + '>' + esc(short) + '</span>' +
                '<a href="/conversations/' + esc(inv.conversation_id) + '" style="color:#4338ca;margin-left:auto;flex-shrink:0">' + esc(inv.conversation_id.substring(0, 8)) + '...</a>' +
                '</div>';
              var summary = inv.summary ? '<div class="invoc-summary">' + renderMarkdown(inv.summary) + '</div>' : '';
              item.innerHTML = meta + repo + summary;
              item.onclick = function(e) {
                if (e.target.closest('a')) return;
                loadConversation(inv.conversation_id);
              };
              list.appendChild(item);
            });
            invocSection.appendChild(list);
          });

        mainEl.appendChild(view);
        renderRichBlocks();
        mainEl.scrollTop = 0;
        mainEl.focus();
      };

      renderSkillView();
    });
}

function showCreateSkillForm(pushHistory) {
  setActiveScreen({ activeNewScreen: 'skill' });
  if (pushHistory !== false) {
    history.pushState(null, '', '/skills/new');
  }

  // Fetch skills to discover repo scopes
  fetch('/api/skills/')
    .then(r => r.json())
    .then(skillsList => {
      var scopes = ['global'];
      var seen = {global: true};
      skillsList.forEach(function(s) {
        if (s.scope !== 'global' && !seen[s.scope]) {
          seen[s.scope] = true;
          scopes.push(s.scope);
        }
      });

      mainEl.innerHTML = '';

      var toolbar = document.createElement('div');
      toolbar.className = 'conversation-toolbar';
      toolbar.innerHTML = '<span class="header-btns"><span class="close-conv" title="Close">&times;</span></span>';
      toolbar.querySelector('.close-conv').onclick = function() { closeConversation('skills'); };
      mainEl.appendChild(toolbar);

      var form = document.createElement('div');
      form.className = 'create-skill-form';
      form.innerHTML =
        '<h3 style="margin-bottom:12px">New skill</h3>' +
        '<div class="kind-options" id="cs-kind">' +
          '<label><input type="radio" name="cs-kind" value="command" checked> Command' +
            '<div class="kind-desc">.claude/commands/name.md — single markdown file</div></label>' +
          '<label><input type="radio" name="cs-kind" value="skill"> Skill' +
            '<div class="kind-desc">.claude/skills/name/SKILL.md — directory with SKILL.md</div></label>' +
        '</div>' +
        '<input type="text" id="cs-name" placeholder="skill-name (kebab-case)">' +
        '<div class="scope-options" id="cs-scopes"></div>' +
        '<textarea id="cs-content" placeholder="Skill content (markdown)..."></textarea>' +
        '<button id="cs-create">Create</button>' +
        '<span class="form-status" id="cs-status"></span>';
      mainEl.appendChild(form);

      var scopesEl = document.getElementById('cs-scopes');
      scopes.forEach(function(scope, i) {
        var label = document.createElement('label');
        var radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'cs-scope';
        radio.value = scope;
        if (i === 0) radio.checked = true;
        label.appendChild(radio);
        label.appendChild(document.createTextNode(' ' + (scope === 'global' ? 'Global' : scope.replace(/^\/home\/[^/]+\//, '~/'))));
        scopesEl.appendChild(label);
      });

      document.getElementById('cs-name').focus();

      document.getElementById('cs-create').onclick = function() {
        var name = document.getElementById('cs-name').value.trim();
        var content = document.getElementById('cs-content').value;
        var scope = document.querySelector('input[name="cs-scope"]:checked').value;
        var kind = document.querySelector('input[name="cs-kind"]:checked').value;
        var statusEl = document.getElementById('cs-status');

        if (!name || !/^[a-z0-9]+(-[a-z0-9]+)*$/.test(name)) {
          statusEl.textContent = 'Name must be kebab-case';
          return;
        }

        statusEl.textContent = 'Creating...';
        fetch('/api/skills/', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name: name, scope: scope, kind: kind, content: content})
        })
        .then(r => r.json().then(d => ({ok: r.ok, data: d})))
        .then(function(resp) {
          if (resp.ok) {
            loadSkillsSidebar();
            loadSkill(resp.data.id);
          } else {
            statusEl.textContent = resp.data.error || 'Error';
          }
        });
      };
    });
}

function handleReturnToPage() {
  if (Date.now() - lastSidebarLoad > 20000) {
    loadSidebar();
    if (!hasActiveScreen()) showHomeScreen(false);
  }
}

document.addEventListener('visibilitychange', function() {
  if (!document.hidden) handleReturnToPage();
});
window.addEventListener('focus', handleReturnToPage);

// Skill URL helpers: display as /skills/global/name or /skills/~/repo/name
function skillDisplayUrl(scope, name) {
  var scopeSlug = scope === 'global' ? 'global' : scope.replace(/^\/home\/[^/]+\//, '~/');
  return '/skills/' + encodeURIComponent(scopeSlug) + '/' + encodeURIComponent(name);
}

function loadSkillByUrl(scopeSlug, name, pushHistory) {
  fetch('/api/skills/')
    .then(r => r.json())
    .then(skills => {
      var match = skills.find(s => {
        var slug = s.scope === 'global' ? 'global' : s.scope.replace(/^\/home\/[^/]+\//, '~/');
        return slug === scopeSlug && s.name === name;
      });
      if (match) loadSkill(match.id, pushHistory);
    });
}

function navigateToSkillByName(name) {
  fetch('/api/skills/')
    .then(function(r) { return r.json(); })
    .then(function(skills) {
      var matches = skills.filter(function(s) { return s.name === name; });
      if (!matches.length) return;
      if (matches.length === 1) { loadSkill(matches[0].id); return; }
      if (currentCwd) {
        var cwdMatch = matches.find(function(s) {
          return s.scope !== 'global' && currentCwd.startsWith(s.scope);
        });
        if (cwdMatch) { loadSkill(cwdMatch.id); return; }
      }
      loadSkill(matches[0].id);
    });
}

function loadCronjobsSidebar() {

      cronjobs.forEach(function(cj) {
        var div = document.createElement('div');
        div.className = 'cronjob-item';
        div.dataset.id = cj.id;

        var repoShort = cj.repo.replace(/^\/home\/[^/]+\//, '~/');
        var rid = RepoIdentity.get(cj.repo);
        var nextInfo = cj.next_run_at ? ' <span style="color:#666">' + esc(timeUntil(cj.next_run_at)) + '</span>' : '';
        div.innerHTML =
          '<div class="cronjob-schedule">' + esc(cj.schedule_summary) + (cj.enabled ? nextInfo : ' <span style="color:#dc2626">(off)</span>') + '</div>' +
          '<div class="cronjob-name">/' + esc(cj.skill_name) + '</div>' +
          '<div class="cronjob-repo">' + (rid ? rid.iconSm : '') + esc(repoShort) + '</div>';

function showCronjobsHome() {
  fetch('/api/cronjobs/')
    .then(function(r) { return r.json(); })
    .then(function(cronjobs) {

          col.style.borderColor = rid.colorBorder;
          col.style.background = rid.colorLight;
        }
        col.innerHTML = '<div class="home-column-header">' + (rid ? rid.iconMd : '') + '<strong>' + esc(short) + '</strong></div>';

          item.onclick = function() { loadCronjob(cj.id); };

        });

      });

function loadCronjob(cronjobId, pushHistory) {
  setActiveScreen({ activeCronjobId: cronjobId });
  if (pushHistory !== false) {
    history.pushState(null, '', '/cronjobs/' + cronjobId);
  }
  document.querySelectorAll('.cronjob-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id == cronjobId);
  });
  if (!cronjobListEl.children.length) loadCronjobsSidebar();

  mainEl.innerHTML = '<div class="empty">Loading...</div>';
  fetch('/api/cronjobs/' + cronjobId + '/')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (activeCronjobId !== cronjobId) return;
      mainEl.innerHTML = '';

      var toolbar = document.createElement('div');
      toolbar.className = 'conversation-toolbar';
      var closeBtn = document.createElement('button');
      closeBtn.className = 'close-conv';
      closeBtn.innerHTML = '&#x2715;';
      closeBtn.title = 'Close';
      closeBtn.onclick = function() { closeConversation('cronjobs'); };
      toolbar.appendChild(closeBtn);
      mainEl.appendChild(toolbar);

      var header = document.createElement('div');
      header.className = 'conversation-header';
      var repoShort = data.repo.replace(/^\/home\/[^/]+\//, '~/');
      var nextRunInfo = data.next_run_at ? ' (next: ' + timeUntil(data.next_run_at) + ')' : '';
      header.innerHTML = '<span style="font-size:18px;font-weight:700">/' + esc(data.skill_name) + '</span>' +
        '<span style="font-size:13px;color:#888">' + esc(data.schedule_summary) + nextRunInfo + '</span>' +
        '<span style="font-size:13px;color:#888">' + esc(repoShort) + '</span>';
      mainEl.appendChild(header);

      var view = document.createElement('div');
      view.className = 'cronjob-detail-view';

      var form = document.createElement('div');
      form.className = 'cronjob-form';

      // Skill dropdown
      var skillLabel = document.createElement('label');
      skillLabel.textContent = 'Skill';
      var skillSelect = document.createElement('select');
      skillSelect.innerHTML = '<option value="">Loading...</option>';
      fetch('/api/skills/')
        .then(function(r) { return r.json(); })
        .then(function(skills) {
          skillSelect.innerHTML = '';
          skills.forEach(function(s) {
            var opt = document.createElement('option');
            opt.value = s.name;
            opt.textContent = '/' + s.name + ' (' + (s.scope === 'global' ? 'global' : s.scope.replace(/^\/home\/[^/]+\//, '~/')) + ')';
            if (s.name === data.skill_name) opt.selected = true;
            skillSelect.appendChild(opt);
          });
        });
      skillLabel.appendChild(skillSelect);

      var skillLink = document.createElement('a');
      skillLink.href = '#';
      skillLink.textContent = 'View skill';
      skillLink.style.cssText = 'font-size:11px;color:#4338ca;font-weight:normal';
      skillLink.onclick = function(e) {
        e.preventDefault();
        navigateToSkillByName(data.skill_name);
      };
      skillLabel.appendChild(skillLink);
      form.appendChild(skillLabel);

      // Repo dropdown
      var repoLabel = document.createElement('label');
      repoLabel.textContent = 'Repository';
      var repoSelect = document.createElement('select');
      repoSelect.innerHTML = '<option value="">Loading...</option>';
      fetch('/api/repos/')
        .then(function(r) { return r.json(); })
        .then(function(repos) {
          repoSelect.innerHTML = '';
          repos.forEach(function(repo) {
            var opt = document.createElement('option');
            opt.value = repo;
            opt.textContent = repo.replace(/^\/home\/[^/]+\//, '~/');

        });

      view.appendChild(runsSection);

      mainEl.appendChild(view);
      mainEl.scrollTop = 0;
      mainEl.focus();
    });

function routeUrl(pathname, pushHistory) {
  var convNew = /^\/conversations\/new\/?$/.test(pathname);
  var convMatch = pathname.match(/^\/conversations\/([^/]+)/);
  var planMatch = pathname.match(/^\/plans\/([^/]+)/);
  var skillNew = /^\/skills\/new\/?$/.test(pathname);
  var skillMatch = pathname.match(/^\/skills\/([^/]+)\/(.+)/);
  var memoryMatch = pathname.match(/^\/memories\/([^/]+)/);
  var repoMatch = pathname.match(/^\/repos\/detail\/(.+)/);
  var cronjobNew = /^\/cronjobs\/new\/?$/.test(pathname);
  var cronjobMatch = pathname.match(/^\/cronjobs\/(\d+)/);
  if (convNew) {
    showCreateSessionForm(pushHistory);
  } else if (convMatch) {
    loadConversation(convMatch[1], pushHistory);
  } else if (planMatch) {
    loadPlan(planMatch[1], pushHistory);
  } else if (skillNew) {
    showCreateSkillForm(pushHistory);
  } else if (skillMatch) {
    loadSkillByUrl(decodeURIComponent(skillMatch[1]), decodeURIComponent(skillMatch[2]), pushHistory);
  } else if (cronjobNew) {
    showCreateCronjobForm(null, pushHistory);
  } else if (cronjobMatch) {
    loadCronjob(parseInt(cronjobMatch[1]), pushHistory);
  } else if (repoMatch) {
    loadRepo(decodeURIComponent(repoMatch[1]), pushHistory);
  } else if (memoryMatch) {
    loadMemory(memoryMatch[1], pushHistory);
  } else if (/^\/cronjobs\b/.test(pathname)) {
    homeTab = 'cronjobs'; showHomeScreen(pushHistory);
  } else if (/^\/memories\b/.test(pathname)) {
    homeTab = 'memory'; showHomeScreen(pushHistory);
  } else if (/^\/skills\b/.test(pathname)) {
    homeTab = 'skills'; showHomeScreen(pushHistory);
  } else if (/^\/plans\b/.test(pathname)) {
    homeTab = 'plans'; showHomeScreen(pushHistory);
  } else if (/^\/repos\b/.test(pathname)) {
    homeTab = 'repos'; showHomeScreen(pushHistory);
  } else if (/^\/activity\b/.test(pathname)) {
    homeTab = 'activity'; showHomeScreen(pushHistory);
  } else {
    homeTab = 'conversations'; showHomeScreen(pushHistory);
  }
}

function loadConversation(id, pushHistory) {
  setActiveScreen({ activeId: id });
  if (pushHistory !== false) {
    history.pushState({id: id}, '', '/conversations/' + id);
  }
  document.querySelectorAll('.conversation-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/conversations/' + id + '/')
    .then(r => r.json())
    .then(data => {
      if (activeId !== id) return;
      const render = () => {
        mainEl.innerHTML = '';
        setCurrentCwd(data.cwd || null);

        const toolbar = document.createElement('div');
        toolbar.className = 'conversation-toolbar';
        toolbar.innerHTML = '<span class="header-btns"><span class="scroll-bottom" title="Scroll to bottom">&#x2193;</span><span class="new-here" title="New session in this directory">+</span><span class="resume-conv" title="Resume in terminal">&#x25b6;</span><span class="fork-conv" title="Fork and resume in terminal">&#x2442;</span><span class="reload-conv" title="Reload">&#x21bb;</span><span class="close-conv" title="Close">&times;</span></span>';
        const project = data.cwd ? data.cwd.replace(/^\/home\/[^/]+\//, '~/') : '';

        const header = document.createElement('div');
        header.className = 'conversation-header';
        var crid = data.cwd ? RepoIdentity.get(data.cwd) : null;
        if (crid) {
          header.style.borderLeft = '3px solid ' + crid.colorBorder;
          header.style.paddingLeft = '12px';
        }
        var parts = [];

        if (project && currentForgeRepo) {
          parts.push('<span>' + (crid ? crid.iconSm : '') + '<a href="' + esc(forgeRepoUrl(currentForgeRepo)) + '" target="_blank" rel="noopener noreferrer">' + esc(project) + '</a></span>');
        } else if (project) {
          parts.push('<span>' + (crid ? crid.iconSm : '') + esc(project) + '</span>');
        }
        if (data.branch) {
          if (currentForgeOrigin) {
            parts.push('<span>branch: <a href="' + esc(forgeBranchUrl(currentForgeOrigin, data.branch)) + '" target="_blank" rel="noopener noreferrer">' + esc(data.branch) + '</a></span>');
          } else {
            parts.push('<span>branch: ' + esc(data.branch) + '</span>');
          }
        }
        if (currentPR) {
          var prLabel = currentForgeRepo && currentForgeRepo.type === 'gitlab' ? 'MR' : 'PR';
          var prPrefix = currentForgeRepo && currentForgeRepo.type === 'gitlab' ? '!' : '#';
          parts.push('<span>' + prLabel + ': <a href="' + esc(currentPR.url) + '" target="_blank" rel="noopener noreferrer">' + prPrefix + currentPR.number + '</a>' + (currentPR.state === 'MERGED' ? ' (merged)' : currentPR.state === 'CLOSED' ? ' (closed)' : '') + '</span>');
        }
        if (data.message_count) parts.push('<span>' + data.message_count + ' messages</span>');
        var duration = formatDuration(data.first_timestamp, data.last_timestamp);
        if (duration) parts.push('<span>' + esc(duration) + '</span>');
        if (data.model) parts.push('<span>' + esc(data.model) + '</span>');
        if (data.version) parts.push('<span>claude-code ' + esc(data.version) + '</span>');
        if (data.file_missing) parts.push('<span class="badge badge-missing">log file deleted — metadata only</span>');
        header.innerHTML = parts.join('');

        toolbar.querySelector('.scroll-bottom').onclick = function() {
          mainEl.scrollTop = mainEl.scrollHeight;
        };
        toolbar.querySelector('.new-here').onclick = function() {
          var btn = this;
          btn.textContent = '...';
          fetch('/api/sessions/new/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cwd: data.cwd})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(({ok}) => {
            btn.textContent = ok ? '\u2713' : '\u2717';
            setTimeout(() => { btn.textContent = '+'; }, 2000);
          });
        };
        if (data.file_missing) {
          toolbar.querySelector('.resume-conv').style.display = 'none';
          toolbar.querySelector('.fork-conv').style.display = 'none';
        }
        toolbar.querySelector('.resume-conv').onclick = function() {
          var btn = this;
          btn.textContent = '...';
          fetch('/api/sessions/resume/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({conversation_id: id, cwd: data.cwd})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(({ok, data: result}) => {
            btn.innerHTML = ok ? '&#x2713;' : '&#x2717;';
            setTimeout(() => { btn.innerHTML = '&#x25b6;'; }, 2000);
          });
        };
        toolbar.querySelector('.fork-conv').onclick = function() {
          var btn = this;
          btn.textContent = '...';
          fetch('/api/sessions/fork/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({conversation_id: id, cwd: data.cwd})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(({ok, data: result}) => {
            btn.innerHTML = ok ? '&#x2713;' : '&#x2717;';
            setTimeout(() => { btn.innerHTML = '&#x2442;'; }, 2000);
          });
        };
        toolbar.querySelector('.reload-conv').onclick = function() { loadConversation(id, false); };
        toolbar.querySelector('.close-conv').onclick = function() { closeConversation('conversations'); };
        mainEl.appendChild(toolbar);
        mainEl.appendChild(header);

        if (data.file_missing) {
          var notice = document.createElement('div');
          notice.className = 'file-missing-notice';
          notice.innerHTML = 'The log file for this conversation has been deleted by Claude Code cleanup. Only cached metadata is available.<br><br>To control how long conversation logs are kept, set <code>cleanupPeriodDays</code> in <code>~/.claude/settings.json</code> <button title="Open in $EDITOR">$EDITOR</button>';
          notice.querySelector('button').onclick = function() {
            var home = (data.cwd || '/tmp').replace(/^(\/home\/[^/]+).*/, '$1');
            openInEditor(home + '/.claude/settings.json');
          };
          mainEl.appendChild(notice);
        }

        taskSubjects = {};
        data.messages.forEach(m => {
          m.content.forEach(block => {
            if (block.type === 'tool_use' && block.name === 'TaskCreate' && block.result) {
              var tm = block.result.match(/Task #(\d+) created successfully: (.+)/);
              if (tm) taskSubjects[tm[1]] = tm[2];
            }
          });
        });

        data.messages.forEach((m, idx) => {
          if (isSkillPrompt(m, data.messages[idx - 1])) {
            var msgDivs = mainEl.querySelectorAll('.message');
            var prevDiv = msgDivs[msgDivs.length - 1];
            if (prevDiv) prevDiv.innerHTML += renderSkillPrompt(m);
            return;
          }
          const div = document.createElement('div');
          div.className = 'message ' + m.role;
          div._messageData = m;
          div.innerHTML = '<div class="role"><span>' + esc(m.role) + '</span><span>' + (m.timestamp ? '<span class="msg-time">' + esc(formatTime(m.timestamp)) + '</span>' : '') + '<span class="copy-msg" title="Copy as markdown">&#x2398;</span></span></div>';

          m.content.forEach(block => {
            div.innerHTML += renderBlock(block);
          });

          mainEl.appendChild(div);
        });
        currentMessages = data.messages;
        updateStatusBar(currentMessages);
        renderRichBlocks();
        mainEl.scrollTop = 0;
        mainEl.focus();

        if (data.active) {
          var indicator = document.createElement('span');
          indicator.className = 'follow-indicator';
          indicator.textContent = 'Following';
          toolbar.querySelector('.header-btns').prepend(indicator);
          startFollowing(id, data.messages.length);
        }
      };

      if (data.cwd) {
        fetch('/api/github-repo/?path=' + encodeURIComponent(data.cwd) + '&branch=' + encodeURIComponent(data.branch || ''))
          .then(r => r.json())
          .then(gh => {
            setForgeAutolink(gh);
            render();
          })
          .catch(() => { setForgeAutolink(null); render(); });
      } else {
        setForgeAutolink(null);
        render();
      }
    });
}

document.addEventListener('click', function(e) {

    var msgEl = copyBtn.closest('.message');
