function routeUrl(pathname, pushHistory) {
  var convMatch = pathname.match(/^\/conversations\/([^/]+)/);
  var planMatch = pathname.match(/^\/plans\/([^/]+)/);
  var skillNew = /^\/skills\/new\/?$/.test(pathname);
  var skillMatch = pathname.match(/^\/skills\/([^/]+)\/(.+)/);
  var memoryMatch = pathname.match(/^\/memories\/([^/]+)/);
  var cronjobNew = /^\/cronjobs\/new\/?$/.test(pathname);
  var cronjobMatch = pathname.match(/^\/cronjobs\/(\d+)/);
  if (convMatch) {
    loadConversation(convMatch[1], pushHistory);
  } else if (planMatch) {
    loadPlan(planMatch[1], pushHistory);
  } else if (skillNew) {
    showCreateSkillForm(pushHistory);
  } else if (skillMatch) {
    loadSkillByUrl(decodeURIComponent(skillMatch[1]), decodeURIComponent(skillMatch[2]), pushHistory);
  } else if (cronjobNew) {
    showCreateCronjobForm(null, pushHistory);
  } else if (cronjobMatch) {
    loadCronjob(parseInt(cronjobMatch[1]), pushHistory);
  } else if (memoryMatch) {
    loadMemory(memoryMatch[1], pushHistory);
  } else if (/^\/cronjobs\b/.test(pathname)) {
    homeTab = 'cronjobs'; showHomeScreen(pushHistory);
  } else if (/^\/memories\b/.test(pathname)) {
    homeTab = 'memory'; showHomeScreen(pushHistory);
  } else if (/^\/skills\b/.test(pathname)) {
    homeTab = 'skills'; showHomeScreen(pushHistory);
  } else if (/^\/plans\b/.test(pathname)) {
    homeTab = 'plans'; showHomeScreen(pushHistory);
  } else if (/^\/activity\b/.test(pathname)) {
    homeTab = 'activity'; showHomeScreen(pushHistory);
  } else {
    homeTab = 'conversations'; showHomeScreen(pushHistory);
  }
}

// open conversation/plan/skill from URL on initial load, or show home screen
routeUrl(location.pathname, false);

window.addEventListener('popstate', function(e) {
  routeUrl(location.pathname, false);
});

function loadConversation(id, pushHistory) {
  stopFollowing();
  setViewType('conversation');
  activeId = id;
  activePlanId = null;
  activeCronjobId = null;
  if (pushHistory !== false) {
    history.pushState({id: id}, '', '/conversations/' + id);
  }
  document.querySelectorAll('.conversation-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  document.querySelectorAll('.plan-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.cronjob-item').forEach(el => el.classList.remove('active'));
  // Expand conversations section, collapse plans
  document.getElementById('conv-section').classList.remove('collapsed');
  document.getElementById('plans-section').classList.add('collapsed');
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/conversations/' + id + '/')
    .then(r => r.json())
    .then(data => {
      if (activeId !== id) return;
      const render = () => {
        mainEl.innerHTML = '';
        currentCwd = data.cwd || null;

        const toolbar = document.createElement('div');
        toolbar.className = 'conversation-toolbar';
        toolbar.innerHTML = '<span class="header-btns"><span class="scroll-bottom" title="Scroll to bottom">&#x2193;</span><span class="new-here" title="New session in this directory">+</span><span class="resume-conv" title="Resume in terminal">&#x25b6;</span><span class="fork-conv" title="Fork and resume in terminal">&#x2442;</span><span class="reload-conv" title="Reload">&#x21bb;</span><span class="close-conv" title="Close">&times;</span></span>';
        const project = data.cwd ? data.cwd.replace(/^\/home\/[^/]+\//, '~/') : '';

        const header = document.createElement('div');
        header.className = 'conversation-header';
        var crid = data.cwd ? RepoIdentity.get(data.cwd) : null;
        if (crid) {
          header.style.borderLeft = '3px solid ' + crid.colorBorder;
          header.style.paddingLeft = '12px';
        }
        var parts = [];

        if (project && currentForgeRepo) {
          parts.push('<span>' + (crid ? crid.iconSm : '') + '<a href="' + esc(forgeRepoUrl(currentForgeRepo)) + '" target="_blank" rel="noopener noreferrer">' + esc(project) + '</a></span>');
        } else if (project) {
          parts.push('<span>' + (crid ? crid.iconSm : '') + esc(project) + '</span>');
        }
        if (data.branch) {
          if (currentForgeOrigin) {
            parts.push('<span>branch: <a href="' + esc(forgeBranchUrl(currentForgeOrigin, data.branch)) + '" target="_blank" rel="noopener noreferrer">' + esc(data.branch) + '</a></span>');
          } else {
            parts.push('<span>branch: ' + esc(data.branch) + '</span>');
          }
        }
        if (currentPR) {
          var prLabel = currentForgeRepo && currentForgeRepo.type === 'gitlab' ? 'MR' : 'PR';
          var prPrefix = currentForgeRepo && currentForgeRepo.type === 'gitlab' ? '!' : '#';
          parts.push('<span>' + prLabel + ': <a href="' + esc(currentPR.url) + '" target="_blank" rel="noopener noreferrer">' + prPrefix + currentPR.number + '</a>' + (currentPR.state === 'MERGED' ? ' (merged)' : currentPR.state === 'CLOSED' ? ' (closed)' : '') + '</span>');
        }
        if (data.message_count) parts.push('<span>' + data.message_count + ' messages</span>');
        var duration = formatDuration(data.first_timestamp, data.last_timestamp);
        if (duration) parts.push('<span>' + esc(duration) + '</span>');
        if (data.model) parts.push('<span>' + esc(data.model) + '</span>');
        if (data.version) parts.push('<span>claude-code ' + esc(data.version) + '</span>');
        header.innerHTML = parts.join('');

        toolbar.querySelector('.scroll-bottom').onclick = function() {
          mainEl.scrollTop = mainEl.scrollHeight;
        };
        toolbar.querySelector('.new-here').onclick = function() {
          var btn = this;
          btn.textContent = '...';
          fetch('/api/sessions/new/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cwd: data.cwd})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(({ok}) => {
            btn.textContent = ok ? '\u2713' : '\u2717';
            setTimeout(() => { btn.textContent = '+'; }, 2000);
          });
        };
        toolbar.querySelector('.resume-conv').onclick = function() {
          var btn = this;
          btn.textContent = '...';
          fetch('/api/sessions/resume/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({conversation_id: id, cwd: data.cwd})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(({ok, data: result}) => {
            btn.innerHTML = ok ? '&#x2713;' : '&#x2717;';
            setTimeout(() => { btn.innerHTML = '&#x25b6;'; }, 2000);
          });
        };
        toolbar.querySelector('.fork-conv').onclick = function() {
          var btn = this;
          btn.textContent = '...';
          fetch('/api/sessions/fork/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({conversation_id: id, cwd: data.cwd})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(({ok, data: result}) => {
            btn.innerHTML = ok ? '&#x2713;' : '&#x2717;';
            setTimeout(() => { btn.innerHTML = '&#x2442;'; }, 2000);
          });
        };
        toolbar.querySelector('.reload-conv').onclick = function() { loadConversation(id, false); };
        toolbar.querySelector('.close-conv').onclick = function() { closeConversation('conversations'); };
        mainEl.appendChild(toolbar);
        mainEl.appendChild(header);

        taskSubjects = {};
        data.messages.forEach(m => {
          m.content.forEach(block => {
            if (block.type === 'tool_use' && block.name === 'TaskCreate' && block.result) {
              var tm = block.result.match(/Task #(\d+) created successfully: (.+)/);
              if (tm) taskSubjects[tm[1]] = tm[2];
            }
          });
        });

        data.messages.forEach((m, idx) => {
          if (isSkillPrompt(m, data.messages[idx - 1])) {
            var msgDivs = mainEl.querySelectorAll('.message');
            var prevDiv = msgDivs[msgDivs.length - 1];
            if (prevDiv) prevDiv.innerHTML += renderSkillPrompt(m);
            return;
          }
          const div = document.createElement('div');
          div.className = 'message ' + m.role;
          div._messageData = m;
          div.innerHTML = '<div class="role"><span>' + esc(m.role) + '</span><span>' + (m.timestamp ? '<span class="msg-time">' + esc(formatTime(m.timestamp)) + '</span>' : '') + '<span class="copy-msg" title="Copy as markdown">&#x2398;</span></span></div>';

          m.content.forEach(block => {
            div.innerHTML += renderBlock(block);
          });

          mainEl.appendChild(div);
        });
        currentMessages = data.messages;
        updateStatusBar(currentMessages);
        renderRichBlocks();
        mainEl.scrollTop = 0;
        mainEl.focus();

        if (data.active) {
          var indicator = document.createElement('span');
          indicator.className = 'follow-indicator';
          indicator.textContent = 'Following';
          toolbar.querySelector('.header-btns').prepend(indicator);
          startFollowing(id, data.messages.length);
        }
      };

      if (data.cwd) {
        fetch('/api/github-repo/?path=' + encodeURIComponent(data.cwd) + '&branch=' + encodeURIComponent(data.branch || ''))
          .then(r => r.json())
          .then(gh => {
            setForgeAutolink(gh);
            render();
          })
          .catch(() => { setForgeAutolink(null); render(); });
      } else {
        setForgeAutolink(null);
        render();
      }
    });
}

let currentForgeRepo = null;
let currentForgeOrigin = null;
let currentPR = null;
let currentCwd = null;

function forgeRepoUrl(f) { return f.base_url + '/' + f.repo; }
function forgeBranchUrl(f, branch) {
  if (f.type === 'gitlab') return forgeRepoUrl(f) + '/-/tree/' + encodeURIComponent(branch);
  if (f.type === 'gitea') return forgeRepoUrl(f) + '/src/branch/' + encodeURIComponent(branch);
  return forgeRepoUrl(f) + '/tree/' + encodeURIComponent(branch);
}
function forgeCommitUrl(f, sha) {
  if (f.type === 'gitlab') return forgeRepoUrl(f) + '/-/commit/' + sha;
  return forgeRepoUrl(f) + '/commit/' + sha;
}
function forgePrUrl(f, id) {
  if (f.type === 'gitlab') return forgeRepoUrl(f) + '/-/merge_requests/' + id;
  if (f.type === 'gitea') return forgeRepoUrl(f) + '/pulls/' + id;
  return forgeRepoUrl(f) + '/pull/' + id;
}
function forgeName(f) {
  if (f.type === 'gitlab') return 'GitLab';
  if (f.type === 'gitea') return 'Gitea';
  return 'GitHub';
}

function setForgeAutolink(gh) {
  currentForgeRepo = (gh && gh.upstream) || (gh && gh.origin);
  currentForgeOrigin = (gh && gh.origin) || (gh && gh.upstream);
  currentPR = gh && gh.pr;
}

function linkifyForge(html) {
  if (currentForgeRepo && currentForgeRepo.type !== 'gitlab') {
    html = html.replace(/(^|[>\s(])#(\d+)\b/g, function(match, before, id) {
      return before + '<a href="' + esc(forgePrUrl(currentForgeRepo, id)) + '" target="_blank" rel="noopener noreferrer">#' + id + '</a>';
    });
  }
  if (currentForgeRepo && currentForgeRepo.type === 'gitlab') {
    html = html.replace(/(^|[>\s(])!(\d+)\b/g, function(match, before, id) {
      return before + '<a href="' + esc(forgePrUrl(currentForgeRepo, id)) + '" target="_blank" rel="noopener noreferrer">!' + id + '</a>';
    });
  }
  html = html.replace(/<code>([0-9a-f]{7})<\/code>/g, function(match, sha) {
    var link = '<code><a href="#" class="git-show-link" data-sha="' + sha + '">' + sha + '</a></code>';
    if (currentForgeRepo) {
      link += '<a href="' + esc(forgeCommitUrl(currentForgeRepo, sha)) + '" target="_blank" rel="noopener noreferrer" class="exticon" title="View on ' + forgeName(currentForgeRepo) + '">&#x2197;</a>';
    }
    return link;
  });
  return html;
}

document.addEventListener('click', function(e) {
  var copyBtn = e.target.closest('.copy-msg');
  if (copyBtn) {
    var msgEl = copyBtn.closest('.message');
    var md = messageToMarkdown(msgEl);
    navigator.clipboard.writeText(md).then(function() {
      copyBtn.textContent = '\u2713';
      setTimeout(function() { copyBtn.innerHTML = '\u2398'; }, 1500);
    });
    return;
  }

  var skillLink = e.target.closest('.skill-link');
  if (skillLink) {
    e.preventDefault();
    var skillName = skillLink.dataset.skill;
    if (skillName) navigateToSkillByName(skillName);
    return;
  }

  var link = e.target.closest('.git-show-link');
  if (!link || !currentCwd) return;
  e.preventDefault();
  fetch('/api/terminal/run/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: ['git', '-c', 'core.pager=less -+F -R', 'show', link.dataset.sha], cwd: currentCwd})
  });
});

function renderMarkdown(text) {
  if (!text) return '';
  var html = linkifyForge(marked.parse(text));
  html = html.replace(/<command-message>([^<]*)<\/command-message>\s*<command-name>\/?([^<]+)<\/command-name>/g, function(match, msg, name) {
    if (!/^[\w][\w.-]*$/.test(name)) return match;
    return '<a href="#" class="skill-link" data-skill="' + esc(name) + '" title="' + esc(msg) + '">/' + esc(name) + '</a>';
  });
  html = html.replace(/<command-message>[^<]*<\/command-message>\n?/g, '');
  html = html.replace(/<command-name>\/?([^<]+)<\/command-name>/g, function(match, name) {
    if (!/^[\w][\w.-]*$/.test(name)) return match;
    return '<a href="#" class="skill-link" data-skill="' + esc(name) + '">/' + esc(name) + '</a>';
  });
  html = html.replace(/<\/?command-args>/g, '');
  return html;
}

function formatJson(str) {
  var trimmed = str.trim();
  if (!(trimmed.charAt(0) === '{' || trimmed.charAt(0) === '[')) return null;
  try {
    var obj = JSON.parse(trimmed);
    var pretty = JSON.stringify(obj, null, 2);
    return pretty.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"([^"\\]*(\\.[^"\\]*)*)"(\s*:)/g, '<span style="color:#881280">"$1"</span>$3')
      .replace(/:\s*"([^"\\]*(\\.[^"\\]*)*)"/g, ': <span style="color:#1a7f37">"$1"</span>')
      .replace(/:\s*(\d+\.?\d*)/g, ': <span style="color:#0550ae">$1</span>')
      .replace(/:\s*(true|false|null)/g, ': <span style="color:#cf222e">$1</span>');
  } catch (e) {
    return null;
  }
}

var taskSubjects = {};

function extractTaskStates(messages) {
  var tasks = {};
  messages.forEach(function(m) {
    m.content.forEach(function(block) {
      if (block.type !== 'tool_use') return;
      if (block.name === 'TaskCreate' && block.result) {
        var tm = block.result.match(/Task #(\d+) created successfully: (.+)/);
        if (tm) {
          tasks[tm[1]] = { id: tm[1], subject: block.input.subject || tm[2], status: 'pending' };
        }
      }
      if (block.name === 'TaskUpdate' && block.input && block.input.taskId) {
        var t = tasks[block.input.taskId];
        if (t) {
          if (block.input.status) t.status = block.input.status;
          if (block.input.subject) t.subject = block.input.subject;
        }
      }
    });
  });
  var counts = { pending: 0, in_progress: 0, completed: 0, total: 0 };
  for (var id in tasks) {
    if (tasks[id].status === 'deleted') continue;
    counts.total++;
    if (counts[tasks[id].status] !== undefined) counts[tasks[id].status]++;
  }
  return { tasks: tasks, counts: counts };
}

function extractRunningAgents(messages) {
  var running = [];
  messages.forEach(function(m) {
    m.content.forEach(function(block) {
      if (block.type === 'tool_use' && block.name === 'Agent') {
        if (!block.subagent && (block.result == null || (typeof block.result === 'string' && block.result.indexOf('Async agent launched') === 0))) {
          running.push({
            description: block.input ? block.input.description || '' : '',
            type: block.input ? block.input.subagent_type || '' : ''
          });
        }
      }
    });
  });
  return running;
}

function scrollToBlock(selector) {
  var els = mainEl.querySelectorAll(selector);
  var el = els.length ? els[els.length - 1] : null;
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.outline = '2px solid #4338ca';
    setTimeout(function() { el.style.outline = ''; }, 2000);
  }
}

function buildStatusBar(messages) {
  var taskState = extractTaskStates(messages);
  var agents = extractRunningAgents(messages);
  if (taskState.counts.total === 0 && agents.length === 0) return null;

  var bar = document.createElement('div');
  bar.className = 'conversation-status-bar';

  if (taskState.counts.total > 0) {
    var tasksEl = document.createElement('div');
    tasksEl.className = 'status-bar-tasks';
    var label = document.createElement('span');
    label.className = 'status-bar-label';
    label.textContent = 'Tasks:';
    tasksEl.appendChild(label);
    var taskIds = Object.keys(taskState.tasks).sort(function(a, b) { return a - b; });
    taskIds.forEach(function(id) {
      var t = taskState.tasks[id];
      if (t.status === 'deleted') return;
      var item = document.createElement('span');
      item.className = 'status-bar-task ' + t.status;
      item.textContent = '#' + id + ' ' + t.subject;
      item.title = '#' + id + ' [' + t.status.replace('_', ' ') + '] ' + t.subject;
      item.onclick = function() {
        scrollToBlock('[data-task-id="' + id + '"]');
      };
      tasksEl.appendChild(item);
    });
    bar.appendChild(tasksEl);
  }

  if (taskState.counts.total > 0 && agents.length > 0) {
    var sep = document.createElement('span');
    sep.className = 'status-bar-separator';
    bar.appendChild(sep);
  }

  if (agents.length > 0) {
    var agentsEl = document.createElement('div');
    agentsEl.className = 'status-bar-agents';
    var alabel = document.createElement('span');
    alabel.className = 'status-bar-label';
    alabel.textContent = 'Agents:';
    agentsEl.appendChild(alabel);
    agents.forEach(function(a) {
      var pill = document.createElement('span');
      pill.className = 'status-bar-agent';
      var desc = a.description || a.type || 'Agent';
      pill.textContent = desc;
      pill.title = (a.type ? a.type + ': ' : '') + (a.description || '');
      pill.onclick = function() {
        scrollToBlock('[data-agent-desc="' + CSS.escape(desc) + '"]');
      };
      agentsEl.appendChild(pill);
    });
    bar.appendChild(agentsEl);
  }

  return bar;
}

function updateStatusBar(messages) {
  var existing = mainWrapEl.querySelector('.conversation-status-bar');
  if (existing) existing.remove();
  if (!messages) return;
  var bar = buildStatusBar(messages);
  if (bar) mainWrapEl.appendChild(bar);
}

function renderToolInput(name, input) {
  var main = null;
  var skip = [];
  if (name === 'Read') {
    skip = ['file_path', 'offset', 'limit'];
    main = '<div class="edit-file">' + esc(input.file_path || '') + '</div>' +
      (input.offset || input.limit ? '<span style="color:#888;font-size:11px">' +
        (input.offset ? ':' + input.offset : '') +
        (input.limit ? ' (' + input.limit + ' lines)' : '') +
      '</span>' : '');
  }
  if (name === 'Bash') {
    skip = ['command', 'description'];
    const desc = input.description ? '<div style="color:#888;font-size:11px">' + esc(input.description) + '</div>' : '';
    main = desc + '<code>' + esc(input.command || '') + '</code>';
  }
  if (name === 'Agent') {
    var label = 'Agent';
    if (input.subagent_type) label += ' <span class="agent-type">' + esc(input.subagent_type) + '</span>';
    var html = '<div class="agent-header">' + label + '</div>';
    if (input.description) html += '<div class="agent-desc">' + esc(input.description) + '</div>';
    if (input.prompt) html += '<div class="agent-prompt">' + renderMarkdown(input.prompt) + '</div>';
    var extra = {};
    var hasExtra = false;
    var skip = ['description', 'subagent_type', 'prompt'];
    for (var k in input) { if (skip.indexOf(k) === -1) { extra[k] = input[k]; hasExtra = true; } }
    if (hasExtra) html += '<div style="margin-top:6px;color:#888;font-size:11px">' + esc(JSON.stringify(extra, null, 2)) + '</div>';
    return html;
  }
  if (name === 'Edit') {
    var header = '<div class="edit-file">' + esc(input.file_path || '') +
      (input.replace_all ? ' <span class="edit-flag">(replace all)</span>' : '') +
      '</div>';
    var old_s = input.old_string || '';
    var new_s = input.new_string || '';
    var diff = '<div class="edit-diff">';
    if (old_s) diff += '<div class="edit-old">' + esc(old_s) + '</div>';
    if (new_s) diff += '<div class="edit-new">' + esc(new_s) + '</div>';
    diff += '</div>';
    return header + diff;
  }
  if (name === 'ExitPlanMode') {
    var html = '';
    if (input.plan) {
      html += '<div class="plan-content">' + renderMarkdown(input.plan) + '</div>';
    }
    if (input.allowedPrompts && input.allowedPrompts.length) {
      html += '<div class="plan-prompts"><div class="plan-prompts-label">Allowed prompts:</div>';
      input.allowedPrompts.forEach(function(p) {
        html += '<div class="plan-prompt"><span class="plan-prompt-tool">' + esc(p.tool) + '</span> ' + esc(p.prompt) + '</div>';
      });
      html += '</div>';
    }
    if (input.planFilePath) {
      var planId = input.planFilePath.split('/').pop().replace(/\.md$/, '');
      html += '<div class="plan-file"><a href="/plans/' + esc(planId) + '" style="color:#6d28d9">' + esc(input.planFilePath) + '</a></div>';
    }
    return html || esc(JSON.stringify(input, null, 2));
  }
  if (name === 'EnterPlanMode') {
    return '<em>Entering plan mode...</em>';
  }
  if (name === 'Grep') {
    skip = ['pattern', 'path', 'head_limit', 'output_mode', '-A', '-B', '-C'];
    main = '<code>grep</code> <code>' + esc(input.pattern || '') + '</code>' +
      (input.path ? ' ' + esc(input.path) : '');
  }
  if (name === 'Glob') {
    skip = ['pattern'];
    main = '<code>' + esc(input.pattern || '') + '</code>';
  }
  if (name === 'Write') {
    var header = '<div class="edit-file">' + esc(input.file_path || '') + '</div>';
    var content = input.content || '';
    var lines = content.split('\n').length;
    var label = lines + ' line' + (lines === 1 ? '' : 's');
    return header + '<details class="write-content"><summary style="color:#888;font-size:11px;cursor:pointer">' + esc(label) + '</summary>' +
      '<pre style="margin:4px 0 0;background:#dfd;padding:6px 8px;border-radius:3px;max-height:300px;overflow-y:auto;white-space:pre-wrap">' + esc(content) + '</pre></details>';
  }
  if (name === 'TaskUpdate') {
    skip = ['taskId', 'status', 'activeForm'];
    var scolor = input.status === 'completed' ? '#15803d' : input.status === 'in_progress' ? '#b45309' : '#555';
    var sbg = input.status === 'completed' ? '#dcfce7' : input.status === 'in_progress' ? '#fef3c7' : '#f0f0f0';
    main = '#' + esc(input.taskId || '?');
    if (input.status) main += ' <span style="background:' + sbg + ';color:' + scolor + ';padding:1px 6px;border-radius:3px;font-size:11px">' + esc(input.status) + '</span>';
    var subj = taskSubjects[input.taskId];
    if (subj) main += ' <span style="color:#888">' + esc(subj) + '</span>';
  }
  if (name === 'TaskCreate') {
    skip = ['subject', 'description', 'activeForm'];
    var tid = '';
    for (var k in taskSubjects) { if (taskSubjects[k] === input.subject) { tid = k; break; } }
    main = (tid ? '#' + esc(tid) + ' ' : '') + '<strong>' + esc(input.subject || '') + '</strong>';
    if (input.description) main += '<div style="color:#888;font-size:11px;margin-top:2px">' + esc(input.description) + '</div>';
  }
  if (name === 'AskUserQuestion') {
    var html = '';
    var questions = input.questions || [];
    questions.forEach(function(q) {
      if (q.header) html += '<div style="font-weight:600;color:#4338ca;margin-bottom:2px">' + esc(q.header) + '</div>';
      html += '<div style="margin-bottom:4px">' + esc(q.question || '') + '</div>';
      if (q.options && q.options.length) {
        html += '<div style="margin-left:8px;font-size:11px;color:#888">';
        q.options.forEach(function(o) {
          html += '<div>&#8226; <strong>' + esc(o.label) + '</strong>' +
            (o.description ? ' &mdash; ' + esc(o.description) : '') + '</div>';
        });
        html += '</div>';
      }
    });
    return html || esc(JSON.stringify(input, null, 2));
  }
  if (name === 'WebFetch') {
    skip = ['url', 'prompt'];
    main = '<a href="' + esc(input.url || '') + '" target="_blank" rel="noopener noreferrer" style="color:#4338ca">' + esc(input.url || '') + '</a>';
    if (input.prompt) main += '<div style="color:#888;font-size:11px;margin-top:2px">' + esc(input.prompt) + '</div>';
  }
  if (name === 'WebSearch') {
    skip = ['query'];
    main = '<code>' + esc(input.query || '') + '</code>';
  }
  if (main === null && name.indexOf('mcp__') === 0) {
    skip = ['cloudId', 'responseContentFormat', 'contentFormat'];
    if (input.issueIdOrKey) {
      skip.push('issueIdOrKey');
      main = '<strong>' + esc(input.issueIdOrKey) + '</strong>';
      if (input.summary) { skip.push('summary'); main += ' ' + esc(input.summary); }
    } else if (input.jql) {
      skip.push('jql');
      main = '<code>' + esc(input.jql) + '</code>';
    } else if (input.summary) {
      skip.push('summary');
      main = (input.projectKey ? esc(input.projectKey) + ': ' : '') + '<strong>' + esc(input.summary) + '</strong>';
      if (input.projectKey) skip.push('projectKey');
    } else if (input.query) {
      skip.push('query');
      main = '<code>' + esc(input.query) + '</code>';
    } else {
      main = '';
    }
  }
  if (main === null) return formatJson(JSON.stringify(input)) || esc(JSON.stringify(input, null, 2));
  var extra = {};
  var hasExtra = false;
  for (var k in input) { if (skip.indexOf(k) === -1) { extra[k] = input[k]; hasExtra = true; } }
  if (hasExtra) main += '\n' + esc(JSON.stringify(extra, null, 2));
  return main;
}

function blockToMarkdown(block) {
  if (block.type === 'text') return block.text || '';
  if (block.type === 'thinking') return '<thinking>\n' + (block.text || '') + '\n</thinking>';
  if (block.type === 'tool_use') {
    if (block.name === 'Skill' && block.input && block.input.skill) {
      var md = '**/' + block.input.skill + '**';
      var extra = {};
      var hasExtra = false;
      for (var k in block.input) { if (k !== 'skill') { extra[k] = block.input[k]; hasExtra = true; } }
      if (hasExtra) md += '\n```json\n' + JSON.stringify(extra, null, 2) + '\n```';
      return md;
    }
    var md = '**' + (block.name || 'Tool') + '**';
    if (block.input) md += '\n```json\n' + JSON.stringify(block.input, null, 2) + '\n```';
    if (block.result) md += '\n**output**\n```\n' + block.result + '\n```';
    if (block.subagent) md += '\n\n' + subagentToMarkdown(block.subagent);
    return md;
  }
  return '';
}

function subagentToMarkdown(sub) {
  var label = (sub.agent_type || 'Agent') + (sub.description ? ': ' + sub.description : '');
  var md = '> **' + label + '**\n';
  sub.messages.forEach(function(m) {
    md += '>\n> **' + m.role + '**\n';
    m.content.forEach(function(block) {
      md += '> ' + blockToMarkdown(block).replace(/\n/g, '\n> ') + '\n';
    });
  });
  return md;
}

function messageToMarkdown(msgEl) {
  var msg = msgEl._messageData;
  if (!msg) return '';
  var parts = [];
  msg.content.forEach(function(block) {
    var md = blockToMarkdown(block);
    if (md) parts.push(md);
  });
  return parts.join('\n\n');
}

function renderToolResult(block) {
  if (!block.result && !block.subagent) return '';
  var html = '';
  if (block.result) {
    var resultBody = (block.name === 'Agent' || block.name === 'ExitPlanMode')
      ? renderMarkdown(block.result)
      : (formatJson(block.result) || esc(block.result));
    html += '<details class="tool-result-inline"><summary>output <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>' +
      '<div class="tool-output">' + resultBody + '</div></details>';
  }
  if (block.subagent) {
    html += renderSubagent(block.subagent);
  }
  return html;
}

function isSkillTrigger(m) {
  if (!m) return false;
  // Pattern 1: user typed /command - text contains <command-name>
  if (m.role === 'user' && m.content.some(b => b.type === 'text' && /<command-name>/.test(b.text))) return true;
  // Pattern 2: assistant invoked Skill tool (tool_results get merged, so skill prompt follows directly)
  if (m.role === 'assistant' && m.content.some(b => b.type === 'tool_use' && b.name === 'Skill')) return true;
  return false;
}

function isSkillPrompt(m, prev) {
  if (!m || m.role !== 'user') return false;
  if (!m.content.every(b => b.type === 'text')) return false;
  return isSkillTrigger(prev);
}

function renderSkillPrompt(m) {
  var body = m.content.map(b => renderMarkdown(b.text)).join('');
  return '<details class="skill-prompt-details"><summary>Skill prompt</summary>' +
    '<div class="skill-prompt-body">' + body + '</div></details>';
}

function renderBlock(block) {
  if (block.type === 'text') {
    return '<div class="block text">' + renderMarkdown(block.text) + '</div>';
  }
  if (block.type === 'thinking') {
    return '<details class="block thinking"><summary>Thinking... <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>' + renderMarkdown(block.text) + '</details>';
  }
  if (block.type === 'tool_use') {
    var result = renderToolResult(block);
    if (block.name === 'ExitPlanMode') {
      return '<div class="block plan-block">' +
        '<div class="plan-header">Plan</div>' +
        renderToolInput(block.name, block.input) +
        result + '</div>';
    }
    if (block.name === 'EnterPlanMode') {
      return '<div class="block plan-enter">' + renderToolInput(block.name, block.input) + result + '</div>';
    }
    if (block.name === 'Skill' && block.input && block.input.skill) {
      var sn = block.input.skill;
      var extra = {};
      var hasExtra = false;
      for (var k in block.input) { if (k !== 'skill') { extra[k] = block.input[k]; hasExtra = true; } }
      return '<div class="block tool_use">' +
        '<div class="tool-name">Skill</div>' +
        '<div class="tool-input">' +
          '<a href="#" class="skill-link" data-skill="' + esc(sn) + '" title="View skill /' + esc(sn) + '">/' + esc(sn) + '</a>' +
          (hasExtra ? '\n' + esc(JSON.stringify(extra, null, 2)) : '') +
        '</div>' + result + '</div>';
    }
    var attrs = '';
    if (block.name === 'TaskCreate' && block.input && block.input.subject) {
      attrs = ' data-task-subject="' + esc(block.input.subject) + '"';
    }
    if (block.name === 'TaskUpdate' && block.input && block.input.taskId) {
      attrs = ' data-task-id="' + esc(block.input.taskId) + '"';
    }
    if (block.name === 'Agent' && block.input) {
      attrs = ' data-agent-desc="' + esc(block.input.description || block.input.subagent_type || 'Agent') + '"';
    }
    return '<div class="block tool_use"' + attrs + '>' +
      '<div class="tool-name">' + esc(block.name) + '</div>' +
      '<div class="tool-input">' + renderToolInput(block.name, block.input) + '</div>' +
      result + '</div>';
  }
  return '';
}

function renderSubagent(sub) {
  var label = (sub.agent_type || 'Agent') + (sub.description ? ': ' + sub.description : '');
  var html = '<details class="subagent"><summary>' + esc(label) + ' <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>';
  html += '<div class="subagent-messages">';
  sub.messages.forEach(function(m) {
    html += '<div class="message ' + m.role + '">';
    html += '<div class="role">' + esc(m.role) + '</div>';
    m.content.forEach(function(block) {
      html += renderBlock(block);
    });
    html += '</div>';
  });
  html += '</div></details>';
  return html;
}

function timeAgo(iso) {
  try {
    var ms = Date.now() - new Date(iso).getTime();
    if (ms < 0 || isNaN(ms)) return '';
    var secs = Math.floor(ms / 1000);
    if (secs < 60) return 'just now';
    var mins = Math.floor(secs / 60);
    if (mins < 60) return mins + 'm ago';
    var hours = Math.floor(mins / 60);
    if (hours < 24) return hours + 'h ago';
    var days = Math.floor(hours / 24);
    if (days < 30) return days + 'd ago';
    return Math.floor(days / 30) + 'mo ago';
  } catch(e) { return ''; }
}

function timeUntil(iso) {
  try {
    var ms = new Date(iso).getTime() - Date.now();
    if (isNaN(ms)) return '';
    if (ms < 0) return 'overdue';
    var secs = Math.floor(ms / 1000);
    if (secs < 60) return 'in <1m';
    var mins = Math.floor(secs / 60);
    if (mins < 60) return 'in ' + mins + 'm';
    var hours = Math.floor(mins / 60);
    var remMins = mins % 60;
    if (hours < 24) return 'in ' + hours + 'h' + (remMins ? ' ' + remMins + 'm' : '');
    var days = Math.floor(hours / 24);
    return 'in ' + days + 'd ' + (hours % 24) + 'h';
  } catch(e) { return ''; }
}

function formatDuration(startIso, endIso) {
  try {
    const ms = new Date(endIso) - new Date(startIso);
    if (ms < 0 || isNaN(ms)) return '';
    const mins = Math.floor(ms / 60000);
    if (mins < 1) return '<1m';
    if (mins < 60) return mins + 'm';
    const hours = Math.floor(mins / 60);
    const remMins = mins % 60;
    if (hours < 24) return hours + 'h' + (remMins ? ' ' + remMins + 'm' : '');
    return Math.floor(hours / 24) + 'd ' + (hours % 24) + 'h';
  } catch(e) { return ''; }
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-CA') + ' ' + d.toLocaleTimeString('en-CA', {hour: '2-digit', minute: '2-digit', hour12: false});
  } catch(e) { return iso; }
}

function formatTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-CA') + ' ' + d.toLocaleTimeString('en-CA', {hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false});
  } catch(e) { return ''; }
}

mainEl.addEventListener('click', function(e) {
  if (!e.target.classList.contains('expand-all')) return;
  e.preventDefault();
  e.stopPropagation();
  const clicked = e.target.closest('details');
  if (!clicked) return;

  const willOpen = !clicked.open;
  mainEl.querySelectorAll('details').forEach(d => { d.open = willOpen; });

  e.target.closest('summary').scrollIntoView({ block: 'nearest' });
});

mainEl.addEventListener('click', function(e) {
  var btn = e.target.closest('.rich-toggle');
  if (!btn) return;
  var container = btn.closest('.rich-container');
  var rendered = container.querySelector('.rich-rendered');
  var source = container.querySelector('.rich-source');
  var showingSource = source.style.display !== 'none';
  rendered.style.display = showingSource ? '' : 'none';
  source.style.display = showingSource ? 'none' : '';
  btn.textContent = showingSource ? 'Source' : 'Diagram';
});

function openInEditor(filePath) {
  var dir = filePath.replace(/\/[^/]+$/, '');
  fetch('/api/terminal/run/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: ['sh', '-c', '"${EDITOR:-vi}" "$1"', '--', filePath], cwd: dir})
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
