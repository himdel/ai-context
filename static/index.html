<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>contexts</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; display: flex; height: 100vh; }

#sidebar {
  width: 320px;
  min-width: 320px;
  border-right: 1px solid #ddd;
  overflow-y: auto;
  background: #f8f8f8;
}

#sidebar h2 {
  padding: 16px;
  font-size: 16px;
  border-bottom: 1px solid #ddd;
}

.conversation-item {
  padding: 12px 16px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.conversation-item:hover { background: #e8e8e8; }
.conversation-item.active { background: #d0d8ff; }

.conversation-item .row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
}

.conversation-item .project {
  font-size: 11px;
  color: #888;
}

.conversation-item .date {
  font-size: 11px;
  color: #666;
}

.conversation-item .indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ddd;
  display: inline-block;
  flex-shrink: 0;
}

.conversation-item .indicator.active { background: #16a34a; }

.conversation-item .badge {
  font-size: 10px;
  color: #888;
  background: #eee;
  border-radius: 8px;
  padding: 1px 6px;
  flex-shrink: 0;
}

.conversation-header {
  font-size: 12px;
  color: #888;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid #eee;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
}

.conversation-header span { white-space: nowrap; }
.conversation-header a { color: #4338ca; text-decoration: none; }
.conversation-header a:hover { text-decoration: underline; }
.conversation-header .header-btns { margin-left: auto; white-space: nowrap; }
.conversation-header .header-btns span { cursor: pointer; color: #888; font-size: 14px; margin-left: 8px; }
.conversation-header .header-btns span:hover { color: #333; }

.conversation-item .blurb {
  font-size: 13px;
  color: #333;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

#main {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

#main .empty {
  color: #999;
  margin-top: 40vh;
  text-align: center;
}

.message {
  margin-bottom: 20px;
  max-width: 800px;
}

.message .role {
  font-size: 12px;
  font-weight: 600;
  color: #555;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.message.user .role { color: #2563eb; }
.message.assistant .role { color: #16a34a; }

.block {
  margin-bottom: 8px;
}

.block.text {
  font-size: 14px;
  line-height: 1.5;
  color: #222;
}

.block.text p { margin: 0.5em 0; }
.block.text p:first-child { margin-top: 0; }
.block.text p:last-child { margin-bottom: 0; }
.block.text pre { background: #f4f4f4; padding: 8px 12px; border-radius: 4px; overflow-x: auto; }
.block.text code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; font-size: 13px; }
.block.text pre code { background: none; padding: 0; }
.block.text ul, .block.text ol { margin: 0.5em 0; padding-left: 1.5em; }
.block.text h1, .block.text h2, .block.text h3 { margin: 0.75em 0 0.25em; }
.block.text h1 { font-size: 1.3em; }
.block.text h2 { font-size: 1.15em; }
.block.text h3 { font-size: 1em; }
.block.text blockquote { border-left: 3px solid #ddd; padding-left: 12px; color: #666; margin: 0.5em 0; }
.block.text table { border-collapse: collapse; margin: 0.5em 0; }
.block.text th, .block.text td { border: 1px solid #ddd; padding: 4px 8px; }
.block.text th { background: #f4f4f4; }

.block.thinking {
  white-space: pre-wrap;
  font-size: 13px;
  line-height: 1.4;
  color: #888;
  border-left: 3px solid #ddd;
  padding-left: 12px;
  font-style: italic;
}

.block.tool_use {
  font-size: 13px;
  background: #f0f4ff;
  border: 1px solid #d0d8f0;
  border-radius: 4px;
  padding: 8px 12px;
}

.block.tool_use .tool-name {
  font-weight: 600;
  color: #4338ca;
  margin-bottom: 4px;
}

.block.tool_use .tool-input {
  white-space: pre-wrap;
  font-family: monospace;
  font-size: 12px;
  color: #555;
  max-height: 200px;
  overflow-y: auto;
}

.block.tool_result {
  font-size: 13px;
  background: #f0faf0;
  border: 1px solid #c0e0c0;
  border-radius: 4px;
  padding: 8px 12px;
}

.block.tool_result .tool-name {
  font-weight: 600;
  color: #15803d;
  margin-bottom: 4px;
}

.block.tool_result .tool-output {
  white-space: pre-wrap;
  font-family: monospace;
  font-size: 12px;
  color: #555;
  max-height: 300px;
  overflow-y: auto;
}

details > summary {
  cursor: pointer;
  user-select: none;
}

.subagent {
  margin: 8px 0;
  border: 1px solid #d0d0e8;
  border-radius: 4px;
  background: #fafaff;
}

.subagent > summary {
  font-size: 13px;
  font-weight: 600;
  color: #4338ca;
  padding: 6px 12px;
}

.subagent .subagent-messages {
  padding: 8px 12px;
  border-top: 1px solid #e0e0f0;
}

.subagent .message {
  margin-bottom: 12px;
}

.expand-all {
  cursor: pointer;
  color: #aaa;
  font-size: 11px;
  margin-left: 6px;
}

.expand-all:hover { color: #555; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="sidebar">
  <h2>Conversations <span id="reload-list-btn" style="float:right;cursor:pointer;font-size:14px;color:#888" title="Reload list">&#x21bb;</span></h2>
  <div id="conversation-list"></div>
</div>

<div id="main" tabindex="-1" style="outline:none">
  <div class="empty">Select a conversation</div>
</div>

<script>
const listEl = document.getElementById('conversation-list');
const mainEl = document.getElementById('main');
const reloadListBtn = document.getElementById('reload-list-btn');
let activeId = null;

// Make all marked-generated links open in new tab
marked.use({
  hooks: {
    postprocess: function(html) {
      return html.replace(/<a href="/g, '<a target="_blank" rel="noopener noreferrer" href="');
    },
  },
});

// Load autolink patterns and register as a marked extension
fetch('/api/autolinks/')
  .then(r => r.json())
  .then(autolinks => {
    if (!autolinks.length) return;
    const reEscape = s => s.replace(/[.*+?^${}()|[\]\\\/]/g, '\\$&');
    const extensions = autolinks.map(al => {
      const name = 'autolink-' + al.prefix;
      const pre = reEscape(al.prefix);
      return {
        name: name,
        level: 'inline',
        start: function(src) { return src.match(new RegExp(pre))?.index; },
        tokenizer: function(src) {
          const match = src.match(new RegExp('^(' + pre + '(\\d+))'));
          if (match) {
            return { type: name, raw: match[0], text: match[1], id: match[2], url: al.url.replace('{id}', match[2]) };
          }
        },
        renderer: function(token) {
          return '<a href="' + esc(token.url) + '" target="_blank" rel="noopener noreferrer">' + esc(token.text) + '</a>';
        },
      };
    });
    marked.use({ extensions: extensions });
  });

reloadListBtn.onclick = function() {
  loadSidebar();
};

function closeConversation() {
  activeId = null;
  history.pushState(null, '', '/');
  document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
  mainEl.innerHTML = '<div class="empty">Select a conversation</div>';
}

function loadSidebar() {
  fetch('/api/conversations/')
    .then(r => r.json())
    .then(conversations => {
      listEl.innerHTML = '';
      conversations.forEach(c => {
        const div = document.createElement('div');
        div.className = 'conversation-item';
        if (c.active) div.classList.add('active-session');
        div.dataset.id = c.id;
        if (c.id === activeId) div.classList.add('active');

        const project = c.project.replace(/^\/home\/[^/]+\//, '~/');
        const duration = formatDuration(c.date, c.last_timestamp);

        div.innerHTML =
          '<div class="row">' +
            '<div class="project">' + esc(project) + (c.branch ? ' (' + esc(c.branch) + ')' : '') + '</div>' +
            '<span class="indicator' + (c.active ? ' active' : '') + '"></span>' +
          '</div>' +
          '<div class="row">' +
            '<div class="date">' + esc(formatDate(c.date)) + (duration ? ', ' + esc(duration) : '') + '</div>' +
            (c.message_count ? '<span class="badge">' + c.message_count + '</span>' : '') +
          '</div>' +
          '<div class="blurb">' + esc(c.blurb) + '</div>';

        div.onclick = () => loadConversation(c.id);
        listEl.appendChild(div);
      });
    });
}

loadSidebar();

// open conversation from URL on initial load
const initMatch = location.pathname.match(/^\/conversations\/([^/]+)/);
if (initMatch) loadConversation(initMatch[1], false);

window.addEventListener('popstate', function(e) {
  const match = location.pathname.match(/^\/conversations\/([^/]+)/);
  if (match) {
    loadConversation(match[1], false);
  } else {
    closeConversation();
  }
});

function loadConversation(id, pushHistory) {
  activeId = id;
  if (pushHistory !== false) {
    history.pushState({id: id}, '', '/conversations/' + id);
  }
  document.querySelectorAll('.conversation-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/conversations/' + id + '/')
    .then(r => r.json())
    .then(data => {
      if (activeId !== id) return;
      const render = () => {
        mainEl.innerHTML = '';

        const header = document.createElement('div');
        header.className = 'conversation-header';
        var parts = [];

        const project = data.cwd ? data.cwd.replace(/^\/home\/[^/]+\//, '~/') : '';
        if (project && currentGithubRepo) {
          parts.push('<span><a href="https://github.com/' + esc(currentGithubRepo) + '" target="_blank" rel="noopener noreferrer">' + esc(project) + '</a></span>');
        } else if (project) {
          parts.push('<span>' + esc(project) + '</span>');
        }
        if (data.branch) {
          if (currentGithubOrigin) {
            parts.push('<span>branch: <a href="https://github.com/' + esc(currentGithubOrigin) + '/tree/' + esc(data.branch) + '" target="_blank" rel="noopener noreferrer">' + esc(data.branch) + '</a></span>');
          } else {
            parts.push('<span>branch: ' + esc(data.branch) + '</span>');
          }
        }
        if (currentPR) {
          parts.push('<span>PR: <a href="' + esc(currentPR.url) + '" target="_blank" rel="noopener noreferrer">#' + currentPR.number + '</a>' + (currentPR.state === 'MERGED' ? ' (merged)' : currentPR.state === 'CLOSED' ? ' (closed)' : '') + '</span>');
        }
        if (data.message_count) parts.push('<span>' + data.message_count + ' messages</span>');
        var duration = formatDuration(data.first_timestamp, data.last_timestamp);
        if (duration) parts.push('<span>' + esc(duration) + '</span>');
        if (data.model) parts.push('<span>' + esc(data.model) + '</span>');
        if (data.version) parts.push('<span>claude-code ' + esc(data.version) + '</span>');

        parts.push('<span class="header-btns"><span class="reload-conv" title="Reload">&#x21bb;</span><span class="close-conv" title="Close">&times;</span></span>');
        header.innerHTML = parts.join('');
        header.querySelector('.reload-conv').onclick = function() { loadConversation(id, false); };
        header.querySelector('.close-conv').onclick = closeConversation;
        mainEl.appendChild(header);

        data.messages.forEach(m => {
          const div = document.createElement('div');
          div.className = 'message ' + m.role;
          div.innerHTML = '<div class="role">' + esc(m.role) + '</div>';

          m.content.forEach(block => {
            div.innerHTML += renderBlock(block);
          });

          mainEl.appendChild(div);
        });
        mainEl.scrollTop = 0;
        mainEl.focus();
      };

      if (data.cwd) {
        fetch('/api/github-repo/?path=' + encodeURIComponent(data.cwd) + '&branch=' + encodeURIComponent(data.branch || ''))
          .then(r => r.json())
          .then(gh => {
            setGithubAutolink(gh);
            render();
          })
          .catch(() => { setGithubAutolink(null); render(); });
      } else {
        setGithubAutolink(null);
        render();
      }
    });
}

let currentGithubRepo = null;
let currentGithubOrigin = null;
let currentPR = null;

function setGithubAutolink(gh) {
  currentGithubRepo = (gh && gh.upstream) || (gh && gh.origin);
  currentGithubOrigin = (gh && gh.origin) || (gh && gh.upstream);
  currentPR = gh && gh.pr;
}

function linkifyGithub(html) {
  if (!currentGithubRepo) return html;
  html = html.replace(/(^|[>\s(])#(\d+)\b/g, function(match, before, id) {
    var url = 'https://github.com/' + currentGithubRepo + '/pull/' + id;
    return before + '<a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">#' + id + '</a>';
  });
  html = html.replace(/<code>([0-9a-f]{7})<\/code>/g, function(match, sha) {
    var url = 'https://github.com/' + currentGithubRepo + '/commit/' + sha;
    return '<code><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + sha + '</a></code>';
  });
  return html;
}

function renderMarkdown(text) {
  if (!text) return '';
  return linkifyGithub(marked.parse(text));
}

function renderToolInput(name, input) {
  var main = null;
  var skip = [];
  if (name === 'Read') {
    skip = ['file_path', 'offset', 'limit'];
    main = esc(input.file_path || '') +
      (input.offset ? ' :' + input.offset : '') +
      (input.limit ? ' (' + input.limit + ' lines)' : '');
  }
  if (name === 'Bash') {
    skip = ['command', 'description'];
    const desc = input.description ? '<div style="color:#888;font-size:11px">' + esc(input.description) + '</div>' : '';
    main = desc + '<code>' + esc(input.command || '') + '</code>';
  }
  if (main === null) return esc(JSON.stringify(input, null, 2));
  var extra = {};
  var hasExtra = false;
  for (var k in input) { if (skip.indexOf(k) === -1) { extra[k] = input[k]; hasExtra = true; } }
  if (hasExtra) main += '\n' + esc(JSON.stringify(extra, null, 2));
  return main;
}

function renderBlock(block) {
  if (block.type === 'text') {
    return '<div class="block text">' + renderMarkdown(block.text) + '</div>';
  }
  if (block.type === 'thinking') {
    return '<details class="block thinking"><summary>Thinking... <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>' + renderMarkdown(block.text) + '</details>';
  }
  if (block.type === 'tool_use') {
    return '<div class="block tool_use">' +
      '<div class="tool-name">' + esc(block.name) + '</div>' +
      '<div class="tool-input">' + renderToolInput(block.name, block.input) + '</div>' +
      '</div>';
  }
  if (block.type === 'tool_result') {
    var html = '<details class="block tool_result">' +
      '<summary class="tool-name">' + esc(block.name || 'Result') + ' output <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>' +
      '<div class="tool-output">' + esc(block.output) + '</div>' +
      '</details>';
    if (block.subagent) {
      html += renderSubagent(block.subagent);
    }
    return html;
  }
  return '';
}

function renderSubagent(sub) {
  var label = (sub.agent_type || 'Agent') + (sub.description ? ': ' + sub.description : '');
  var html = '<details class="subagent"><summary>' + esc(label) + ' <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>';
  html += '<div class="subagent-messages">';
  sub.messages.forEach(function(m) {
    html += '<div class="message ' + m.role + '">';
    html += '<div class="role">' + esc(m.role) + '</div>';
    m.content.forEach(function(block) {
      html += renderBlock(block);
    });
    html += '</div>';
  });
  html += '</div></details>';
  return html;
}

function formatDuration(startIso, endIso) {
  try {
    const ms = new Date(endIso) - new Date(startIso);
    if (ms < 0 || isNaN(ms)) return '';
    const mins = Math.floor(ms / 60000);
    if (mins < 1) return '<1m';
    if (mins < 60) return mins + 'm';
    const hours = Math.floor(mins / 60);
    const remMins = mins % 60;
    if (hours < 24) return hours + 'h' + (remMins ? ' ' + remMins + 'm' : '');
    return Math.floor(hours / 24) + 'd ' + (hours % 24) + 'h';
  } catch(e) { return ''; }
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-CA') + ' ' + d.toLocaleTimeString('en-CA', {hour: '2-digit', minute: '2-digit', hour12: false});
  } catch(e) { return iso; }
}

mainEl.addEventListener('click', function(e) {
  if (!e.target.classList.contains('expand-all')) return;
  e.preventDefault();
  e.stopPropagation();
  const clicked = e.target.closest('details');
  if (!clicked) return;

  const willOpen = !clicked.open;
  mainEl.querySelectorAll('details').forEach(d => { d.open = willOpen; });

  e.target.closest('summary').scrollIntoView({ block: 'nearest' });
});

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
