<body>

<div id="sidebar">
  <div class="sidebar-section" id="conv-section">
    <h2><span class="toggle">&#x25BC;</span>Conversations <span id="reload-list-btn" style="float:right;cursor:pointer;font-size:14px;color:#888" title="Reload list">&#x21bb;</span><span id="new-session-btn" style="float:right;cursor:pointer;font-size:14px;color:#888;margin-right:8px" title="New session">+</span></h2>
    <div class="sidebar-list" id="conversation-list"></div>
  </div>
  <div class="sidebar-section collapsed" id="plans-section">
    <h2><span class="toggle">&#x25BC;</span>Plans</h2>
    <div class="sidebar-list" id="plan-list"></div>
  </div>
  <div class="sidebar-section collapsed" id="skills-section">
    <h2><span class="toggle">&#x25BC;</span>Skills
      <span id="new-skill-btn" style="float:right;cursor:pointer;font-size:14px;color:#888" title="New skill">+</span>
    </h2>
    <div class="sidebar-list" id="skill-list"></div>
  </div>
</div>

<div id="main" tabindex="-1" style="outline:none"></div>

<script>
const listEl = document.getElementById('conversation-list');
const planListEl = document.getElementById('plan-list');
const skillListEl = document.getElementById('skill-list');
const mainEl = document.getElementById('main');
const reloadListBtn = document.getElementById('reload-list-btn');
let activeId = null;
let activePlanId = null;
let activeSkillId = null;

// Repo visual identity — deterministic icon + color per repo path
var RepoIdentity = {
  _cache: {},
  _hash: function(str) {
    var h = 0x811c9dc5;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 0x01000193);
    }
    return h >>> 0;
  },
  _icon: function(hash, hue, size) {
    var color = 'hsl(' + hue + ',55%,45%)';
    var bg = 'hsl(' + hue + ',30%,90%)';
    var bits = hash >>> 8;
    var rects = '';
    for (var r = 0; r < 5; r++) {
      for (var c = 0; c < 3; c++) {
        if ((bits >> (r * 3 + c)) & 1) {
          rects += '<rect x="' + c + '" y="' + r + '" width="1" height="1" fill="' + color + '"/>';
          if (c < 2) rects += '<rect x="' + (4 - c) + '" y="' + r + '" width="1" height="1" fill="' + color + '"/>';
        }
      }
    }
    return '<span class="repo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5 5" width="' + size + '" height="' + size + '" style="background:' + bg + ';border-radius:2px">' + rects + '</svg></span>';
  },
  get: function(repoPath) {
    if (!repoPath) return null;
    if (this._cache[repoPath]) return this._cache[repoPath];
    var hash = this._hash(repoPath);
    var hue = (hash & 0xFF) * 360 / 256;
    var id = {
      color: 'hsl(' + hue + ',55%,45%)',
      colorLight: 'hsl(' + hue + ',40%,93%)',
      colorBorder: 'hsl(' + hue + ',55%,55%)',
      colorText: 'hsl(' + hue + ',50%,35%)',
      iconSm: this._icon(hash, hue, 16),
      iconMd: this._icon(hash, hue, 24),
    };
    this._cache[repoPath] = id;
    return id;
  }
};

// Sidebar section accordion
document.querySelectorAll('.sidebar-section h2').forEach(function(h2) {
  h2.addEventListener('click', function(e) {
    if (e.target.closest('#reload-list-btn') || e.target.closest('#new-session-btn') || e.target.closest('#new-skill-btn')) return;
    var section = h2.closest('.sidebar-section');
    var wasCollapsed = section.classList.contains('collapsed');
    if (wasCollapsed) {
      section.classList.remove('collapsed');
      // Load plans on first expand
      if (section.id === 'plans-section' && !planListEl.children.length) {
        loadPlansSidebar();
      }
      // Load skills on first expand
      if (section.id === 'skills-section' && !skillListEl.children.length) {
        loadSkillsSidebar();
      }
    } else {
      section.classList.add('collapsed');
    }
  });
});
let followInterval = null;
let followConvId = null;
let renderedMsgCount = 0;

// Make all marked-generated links open in new tab
marked.use({
  hooks: {
    postprocess: function(html) {
      return html.replace(/<a href="/g, '<a target="_blank" rel="noopener noreferrer" href="');
    },

// Load autolink patterns and register as a marked extension
fetch('/api/autolinks/')
  .then(r => r.json())
  .then(autolinks => {
    if (!autolinks.length) return;
    const reEscape = s => s.replace(/[.*+?^${}()|[\]\\\/]/g, '\\$&');
    const extensions = autolinks.map(al => {
      const name = 'autolink-' + al.prefix;
      const pre = reEscape(al.prefix);
      return {
        name: name,
        level: 'inline',
        start: function(src) { return src.match(new RegExp(pre))?.index; },
        tokenizer: function(src) {
          const match = src.match(new RegExp('^(' + pre + '(\\d+))'));
          if (match) {
            return { type: name, raw: match[0], text: match[1], id: match[2], url: al.url.replace('{id}', match[2]) };
          }
        },
        renderer: function(token) {
          return '<a href="' + esc(token.url) + '" target="_blank" rel="noopener noreferrer">' + esc(token.text) + '</a>';
        },
      };
    });
    marked.use({ extensions: extensions });
  });

            if (newConv) {

              loadConversation(newConv.id);
            }

function loadPlan(planId, pushHistory) {
  stopFollowing();
  activeId = null;
  activePlanId = planId;
  if (pushHistory !== false) {
    history.pushState({planId: planId}, '', '/plans/' + planId);
  }
  document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.plan-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === planId);
  });
  // Expand plans section, collapse conversations
  document.getElementById('plans-section').classList.remove('collapsed');
  document.getElementById('conv-section').classList.add('collapsed');
  if (!planListEl.children.length) loadPlansSidebar();
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/plans/' + planId + '/')
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        mainEl.innerHTML = '<div class="empty">' + esc(data.error) + '</div>';
        return;
      }

      var renderPlan = function() {
        mainEl.innerHTML = '';

        var toolbar = document.createElement('div');
        toolbar.className = 'conversation-toolbar';
        toolbar.innerHTML = '<span class="header-btns"><span class="close-conv" title="Close">&times;</span></span>';
        toolbar.querySelector('.close-conv').onclick = closeConversation;
        mainEl.appendChild(toolbar);

        var header = document.createElement('div');
        header.className = 'conversation-header';
        var prid = data.cwd ? RepoIdentity.get(data.cwd) : null;
        if (prid) {
          header.style.borderLeft = '3px solid ' + prid.colorBorder;
          header.style.paddingLeft = '12px';
        }
        var parts = [];

        var project = data.cwd ? data.cwd.replace(/^\/home\/[^/]+\//, '~/') : '';
        if (project && currentGithubRepo) {
          parts.push('<span>' + (prid ? prid.iconSm : '') + '<a href="https://github.com/' + esc(currentGithubRepo) + '" target="_blank" rel="noopener noreferrer">' + esc(project) + '</a></span>');
        } else if (project) {
          parts.push('<span>' + (prid ? prid.iconSm : '') + esc(project) + '</span>');
        }
        if (data.branch) {
          if (currentGithubOrigin) {
            parts.push('<span>branch: <a href="https://github.com/' + esc(currentGithubOrigin) + '/tree/' + esc(data.branch) + '" target="_blank" rel="noopener noreferrer">' + esc(data.branch) + '</a></span>');
          } else {
            parts.push('<span>branch: ' + esc(data.branch) + '</span>');
          }
        }
        if (currentPR) {
          parts.push('<span>PR: <a href="' + esc(currentPR.url) + '" target="_blank" rel="noopener noreferrer">#' + currentPR.number + '</a>' + (currentPR.state === 'MERGED' ? ' (merged)' : currentPR.state === 'CLOSED' ? ' (closed)' : '') + '</span>');
        }
        if (data.conversation_id) {
          parts.push('<span>conversation: <a href="/conversations/' + esc(data.conversation_id) + '" style="color:#4338ca">' + esc(data.conversation_id.substring(0, 8)) + '...</a></span>');
        }
        header.innerHTML = parts.join('');
        mainEl.appendChild(header);

        var view = document.createElement('div');
        view.className = 'plan-detail-view';

        var actions = document.createElement('div');
        actions.className = 'plan-actions';

        var execBtn = document.createElement('button');
        execBtn.textContent = 'Execute plan';
        execBtn.onclick = function() {
          execBtn.textContent = '...';
          fetch('/api/plans/' + planId + '/execute/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cwd: data.cwd || ''})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(function(resp) {
            execBtn.textContent = resp.ok ? 'Launched' : 'Error';
            setTimeout(function() { execBtn.textContent = 'Execute plan'; }, 2000);
          });
        };
        actions.appendChild(execBtn);
        view.appendChild(actions);

        var planBlock = document.createElement('div');
        planBlock.className = 'block plan-block';
        planBlock.innerHTML =
          '<div class="plan-header">' + esc(data.title) + '</div>' +
          '<div class="plan-content">' + renderMarkdown(data.content) + '</div>';
        view.appendChild(planBlock);

        mainEl.appendChild(view);
        mainEl.scrollTop = 0;
        mainEl.focus();
      };

      if (data.cwd) {
        fetch('/api/github-repo/?path=' + encodeURIComponent(data.cwd) + '&branch=' + encodeURIComponent(data.branch || ''))
          .then(r => r.json())
          .then(gh => { setGithubAutolink(gh); renderPlan(); })
          .catch(() => { setGithubAutolink(null); renderPlan(); });
      } else {
        setGithubAutolink(null);
        renderPlan();
      }
    });
}

function isNearBottom(el, threshold) {
  return (el.scrollHeight - el.scrollTop - el.clientHeight) < (threshold || 150);
}

function startFollowing(id, msgCount) {
  stopFollowing();
  followConvId = id;
  renderedMsgCount = msgCount;
  followInterval = setInterval(pollForUpdates, 5000);
}

function stopFollowing() {
  if (followInterval) clearInterval(followInterval);
  followInterval = null;
  followConvId = null;
  renderedMsgCount = 0;
}

function pollForUpdates() {
  if (document.hidden) return;
  if (!followConvId || activeId !== followConvId) {
    stopFollowing();
    return;
  }
  if (Date.now() - lastSidebarLoad > 20000) loadSidebar();

  fetch('/api/conversations/' + followConvId + '/')
    .then(r => r.json())
    .then(data => {
      if (activeId !== followConvId) return;
      if (data.messages && data.messages.length > renderedMsgCount) {
        var wasNear = isNearBottom(mainEl);
        var newMessages = data.messages.slice(renderedMsgCount);
        newMessages.forEach(function(m) {
          var div = document.createElement('div');
          div.className = 'message new-msg ' + m.role;
          div.innerHTML = '<div class="role"><span>' + esc(m.role) + '</span>' + (m.timestamp ? '<span class="msg-time">' + esc(formatTime(m.timestamp)) + '</span>' : '') + '</div>';
          m.content.forEach(function(block) {
            div.innerHTML += renderBlock(block);
          });
          mainEl.appendChild(div);
        });
        renderedMsgCount = data.messages.length;
        if (wasNear) mainEl.scrollTop = mainEl.scrollHeight;
      }
      if (!data.active) {
        stopFollowing();
        var indicator = mainEl.querySelector('.follow-indicator');
        if (indicator) indicator.remove();
      }
    })
    .catch(function() {});
}

}

function updateFavicon(count) {
  var canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  var ctx = canvas.getContext('2d');

  // Background circle
  ctx.beginPath();
  ctx.arc(32, 32, 30, 0, 2 * Math.PI);
  ctx.fillStyle = count > 0 ? '#16a34a' : '#999';
  ctx.fill();

  // Number text
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + (count > 99 ? '28' : count > 9 ? '32' : '38') + 'px system-ui, sans-serif';
  ctx.fillText(count > 99 ? '99+' : String(count), 32, 34);

  var link = document.querySelector('link[rel="icon"]');
  if (!link) {
    link = document.createElement('link');
    link.rel = 'icon';
    document.head.appendChild(link);
  }
  link.type = 'image/png';
  link.href = canvas.toDataURL('image/png');
}

          if (s.modified) meta += '<span>' + esc(formatDate(s.modified)) + '</span>';
          meta += '</div>';
          item.innerHTML = meta + '<div>/' + esc(s.name) + '</div>';
          item.onclick = function() { loadSkill(s.id); };
          list.appendChild(item);
        });

        col.appendChild(list);
        container.appendChild(col);
      });
    });
}

function loadSkill(skillId, pushHistory) {
  stopFollowing();
  activeId = null;
  activePlanId = null;
  activeSkillId = skillId;
  document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.plan-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.skill-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === skillId);
  });
  // Expand skills section, collapse others
  document.getElementById('skills-section').classList.remove('collapsed');
  document.getElementById('conv-section').classList.add('collapsed');
  document.getElementById('plans-section').classList.add('collapsed');
  if (!skillListEl.children.length) loadSkillsSidebar();
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/skills/' + skillId + '/')
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        mainEl.innerHTML = '<div class="empty">' + esc(data.error) + '</div>';
        return;
      }
      if (pushHistory !== false) {
        history.pushState({skillId: skillId}, '', skillDisplayUrl(data.scope, data.name));
      }

      var renderSkillView = function() {
        mainEl.innerHTML = '';

        var toolbar = document.createElement('div');
        toolbar.className = 'conversation-toolbar';
        toolbar.innerHTML = '<span class="header-btns"><span class="close-conv" title="Close">&times;</span></span>';
        toolbar.querySelector('.close-conv').onclick = closeConversation;
        mainEl.appendChild(toolbar);

        var header = document.createElement('div');
        header.className = 'conversation-header';
        var scopeLabel = data.scope === 'global' ? 'Global' : data.scope.replace(/^\/home\/[^/]+\//, '~/');
        header.innerHTML = '<span>/' + esc(data.name) + '</span><span>' + esc(scopeLabel) + '</span><span style="font-family:monospace;font-size:11px">' + esc(data.path) + '</span>';
        mainEl.appendChild(header);

        var view = document.createElement('div');
        view.className = 'skill-detail-view';

        var actions = document.createElement('div');
        actions.className = 'skill-actions';

        var editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.onclick = function() {
          contentBlock.innerHTML = '';
          var textarea = document.createElement('textarea');
          textarea.className = 'skill-edit-area';
          textarea.value = data.content;
          contentBlock.appendChild(textarea);

          actions.innerHTML = '';
          var saveBtn = document.createElement('button');
          saveBtn.textContent = 'Save';
          saveBtn.onclick = function() {
            saveBtn.textContent = '...';
            fetch('/api/skills/' + skillId + '/', {
              method: 'PUT',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({content: textarea.value})
            })
            .then(r => r.json().then(d => ({ok: r.ok, data: d})))
            .then(function(resp) {
              if (resp.ok) {
                loadSkill(skillId, false);
              } else {
                saveBtn.textContent = 'Error';
                setTimeout(function() { saveBtn.textContent = 'Save'; }, 2000);
              }
            });
          };
          actions.appendChild(saveBtn);

          var cancelBtn = document.createElement('button');
          cancelBtn.textContent = 'Cancel';
          cancelBtn.onclick = function() { loadSkill(skillId, false); };
          actions.appendChild(cancelBtn);
        };
        actions.appendChild(editBtn);

        var deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.style.color = '#dc2626';
        deleteBtn.style.borderColor = '#fca5a5';
        deleteBtn.onclick = function() {
          if (!confirm('Delete skill /' + data.name + '?')) return;
          fetch('/api/skills/' + skillId + '/', {method: 'DELETE'})
            .then(function() {
              loadSkillsSidebar();
              closeConversation();
            });
        };
        actions.appendChild(deleteBtn);

        view.appendChild(actions);

        var contentBlock = document.createElement('div');
        contentBlock.className = 'block text';
        contentBlock.innerHTML = renderMarkdown(data.content);
        view.appendChild(contentBlock);

        mainEl.appendChild(view);
        mainEl.scrollTop = 0;
        mainEl.focus();
      };

      renderSkillView();
    });
}

function showCreateSkillForm(pushHistory) {
  stopFollowing();
  activeId = null;
  activePlanId = null;
  activeSkillId = null;
  if (pushHistory !== false) {
    history.pushState(null, '', '/skills/new');
  }
  document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.plan-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.skill-item').forEach(el => el.classList.remove('active'));

  // Fetch skills to discover repo scopes
  fetch('/api/skills/')
    .then(r => r.json())
    .then(skillsList => {
      var scopes = ['global'];
      var seen = {global: true};
      skillsList.forEach(function(s) {
        if (s.scope !== 'global' && !seen[s.scope]) {
          seen[s.scope] = true;
          scopes.push(s.scope);
        }
      });

      mainEl.innerHTML = '';

      var toolbar = document.createElement('div');
      toolbar.className = 'conversation-toolbar';
      toolbar.innerHTML = '<span class="header-btns"><span class="close-conv" title="Close">&times;</span></span>';
      toolbar.querySelector('.close-conv').onclick = closeConversation;
      mainEl.appendChild(toolbar);

      var form = document.createElement('div');
      form.className = 'create-skill-form';
      form.innerHTML =
        '<h3 style="margin-bottom:12px">New skill</h3>' +
        '<input type="text" id="cs-name" placeholder="skill-name (kebab-case)">' +
        '<div class="scope-options" id="cs-scopes"></div>' +
        '<textarea id="cs-content" placeholder="Skill content (markdown)..."></textarea>' +
        '<button id="cs-create">Create</button>' +
        '<span class="form-status" id="cs-status"></span>';
      mainEl.appendChild(form);

      var scopesEl = document.getElementById('cs-scopes');
      scopes.forEach(function(scope, i) {
        var label = document.createElement('label');
        var radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'cs-scope';
        radio.value = scope;
        if (i === 0) radio.checked = true;
        label.appendChild(radio);
        label.appendChild(document.createTextNode(' ' + (scope === 'global' ? 'Global' : scope.replace(/^\/home\/[^/]+\//, '~/'))));
        scopesEl.appendChild(label);
      });

      document.getElementById('cs-name').focus();

      document.getElementById('cs-create').onclick = function() {
        var name = document.getElementById('cs-name').value.trim();
        var content = document.getElementById('cs-content').value;
        var scope = document.querySelector('input[name="cs-scope"]:checked').value;
        var statusEl = document.getElementById('cs-status');

        if (!name || !/^[a-z0-9]+(-[a-z0-9]+)*$/.test(name)) {
          statusEl.textContent = 'Name must be kebab-case';
          return;
        }

        statusEl.textContent = 'Creating...';
        fetch('/api/skills/', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name: name, scope: scope, content: content})
        })
        .then(r => r.json().then(d => ({ok: r.ok, data: d})))
        .then(function(resp) {
          if (resp.ok) {
            loadSkillsSidebar();
            loadSkill(resp.data.id);
          } else {
            statusEl.textContent = resp.data.error || 'Error';
          }
        });
      };
    });
}

function handleReturnToPage() {
  if (Date.now() - lastSidebarLoad > 20000) {
    loadSidebar();
    if (!activeId) showHomeScreen(false);
  }
}

document.addEventListener('visibilitychange', function() {
  if (!document.hidden) handleReturnToPage();
});
window.addEventListener('focus', handleReturnToPage);

// Skill URL helpers: display as /skills/global/name or /skills/~/repo/name
function skillDisplayUrl(scope, name) {
  var scopeSlug = scope === 'global' ? 'global' : scope.replace(/^\/home\/[^/]+\//, '~/');
  return '/skills/' + encodeURIComponent(scopeSlug) + '/' + encodeURIComponent(name);
}

function loadSkillByUrl(scopeSlug, name, pushHistory) {
  fetch('/api/skills/')
    .then(r => r.json())
    .then(skills => {
      var match = skills.find(s => {
        var slug = s.scope === 'global' ? 'global' : s.scope.replace(/^\/home\/[^/]+\//, '~/');
        return slug === scopeSlug && s.name === name;
      });
      if (match) loadSkill(match.id, pushHistory);
    });
}

function routeUrl(pathname, pushHistory) {
  var convMatch = pathname.match(/^\/conversations\/([^/]+)/);
  var planMatch = pathname.match(/^\/plans\/([^/]+)/);
  var skillNew = /^\/skills\/new\/?$/.test(pathname);
  var skillMatch = pathname.match(/^\/skills\/([^/]+)\/(.+)/);
  if (convMatch) {
    loadConversation(convMatch[1], pushHistory);
  } else if (planMatch) {
    loadPlan(planMatch[1], pushHistory);
  } else if (skillNew) {
    showCreateSkillForm(pushHistory);
  } else if (skillMatch) {
    loadSkillByUrl(decodeURIComponent(skillMatch[1]), decodeURIComponent(skillMatch[2]), pushHistory);
  } else if (/^\/skills\b/.test(pathname)) {
    homeTab = 'skills'; showHomeScreen(pushHistory);
  } else if (/^\/plans\b/.test(pathname)) {
    homeTab = 'plans'; showHomeScreen(pushHistory);
  } else {
    homeTab = 'conversations'; showHomeScreen(pushHistory);
  }
}

// open conversation/plan/skill from URL on initial load, or show home screen
routeUrl(location.pathname, false);

window.addEventListener('popstate', function(e) {
  routeUrl(location.pathname, false);
});

function loadConversation(id, pushHistory) {
  stopFollowing();
  activeId = id;
  activePlanId = null;
  if (pushHistory !== false) {
    history.pushState({id: id}, '', '/conversations/' + id);
  }
  document.querySelectorAll('.conversation-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  document.querySelectorAll('.plan-item').forEach(el => el.classList.remove('active'));
  // Expand conversations section, collapse plans
  document.getElementById('conv-section').classList.remove('collapsed');
  document.getElementById('plans-section').classList.add('collapsed');
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/conversations/' + id + '/')
    .then(r => r.json())
    .then(data => {
      if (activeId !== id) return;
      const render = () => {
        mainEl.innerHTML = '';
        currentCwd = data.cwd || null;

        const toolbar = document.createElement('div');
        toolbar.className = 'conversation-toolbar';
        toolbar.innerHTML = '<span class="header-btns"><span class="scroll-bottom" title="Scroll to bottom">&#x2193;</span><span class="new-here" title="New session in this directory">+</span><span class="resume-conv" title="Resume in terminal">&#x25b6;</span><span class="reload-conv" title="Reload">&#x21bb;</span><span class="close-conv" title="Close">&times;</span></span>';
        const project = data.cwd ? data.cwd.replace(/^\/home\/[^/]+\//, '~/') : '';

        const header = document.createElement('div');
        header.className = 'conversation-header';
        var crid = data.cwd ? RepoIdentity.get(data.cwd) : null;
        if (crid) {
          header.style.borderLeft = '3px solid ' + crid.colorBorder;
          header.style.paddingLeft = '12px';
        }
        var parts = [];

        if (project && currentGithubRepo) {
          parts.push('<span>' + (crid ? crid.iconSm : '') + '<a href="https://github.com/' + esc(currentGithubRepo) + '" target="_blank" rel="noopener noreferrer">' + esc(project) + '</a></span>');
        } else if (project) {
          parts.push('<span>' + (crid ? crid.iconSm : '') + esc(project) + '</span>');
        }
        if (data.branch) {
          if (currentGithubOrigin) {
            parts.push('<span>branch: <a href="https://github.com/' + esc(currentGithubOrigin) + '/tree/' + esc(data.branch) + '" target="_blank" rel="noopener noreferrer">' + esc(data.branch) + '</a></span>');
          } else {
            parts.push('<span>branch: ' + esc(data.branch) + '</span>');
          }
        }
        if (currentPR) {
          parts.push('<span>PR: <a href="' + esc(currentPR.url) + '" target="_blank" rel="noopener noreferrer">#' + currentPR.number + '</a>' + (currentPR.state === 'MERGED' ? ' (merged)' : currentPR.state === 'CLOSED' ? ' (closed)' : '') + '</span>');
        }
        if (data.message_count) parts.push('<span>' + data.message_count + ' messages</span>');
        var duration = formatDuration(data.first_timestamp, data.last_timestamp);
        if (duration) parts.push('<span>' + esc(duration) + '</span>');
        if (data.model) parts.push('<span>' + esc(data.model) + '</span>');
        if (data.version) parts.push('<span>claude-code ' + esc(data.version) + '</span>');
        header.innerHTML = parts.join('');

        toolbar.querySelector('.scroll-bottom').onclick = function() {
          mainEl.scrollTop = mainEl.scrollHeight;
        };
        toolbar.querySelector('.new-here').onclick = function() {
          var btn = this;
          btn.textContent = '...';
          fetch('/api/sessions/new/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cwd: data.cwd})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(({ok}) => {
            btn.textContent = ok ? '\u2713' : '\u2717';
            setTimeout(() => { btn.textContent = '+'; }, 2000);
          });
        };
        toolbar.querySelector('.resume-conv').onclick = function() {
          var btn = this;
          btn.textContent = '...';
          fetch('/api/sessions/resume/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({conversation_id: id, cwd: data.cwd})
          })
          .then(r => r.json().then(d => ({ok: r.ok, data: d})))
          .then(({ok, data: result}) => {
            btn.innerHTML = ok ? '&#x2713;' : '&#x2717;';
            setTimeout(() => { btn.innerHTML = '&#x25b6;'; }, 2000);
          });
        };
        toolbar.querySelector('.reload-conv').onclick = function() { loadConversation(id, false); };
        toolbar.querySelector('.close-conv').onclick = closeConversation;
        mainEl.appendChild(toolbar);
        mainEl.appendChild(header);

        data.messages.forEach(m => {
          const div = document.createElement('div');
          div.className = 'message ' + m.role;
          div.innerHTML = '<div class="role"><span>' + esc(m.role) + '</span>' + (m.timestamp ? '<span class="msg-time">' + esc(formatTime(m.timestamp)) + '</span>' : '') + '</div>';

          m.content.forEach(block => {
            div.innerHTML += renderBlock(block);
          });

          mainEl.appendChild(div);
        });
        mainEl.scrollTop = 0;
        mainEl.focus();

        if (data.active) {
          var indicator = document.createElement('span');
          indicator.className = 'follow-indicator';
          indicator.textContent = 'Following';
          toolbar.querySelector('.header-btns').prepend(indicator);
          startFollowing(id, data.messages.length);
        }
      };

      if (data.cwd) {
        fetch('/api/github-repo/?path=' + encodeURIComponent(data.cwd) + '&branch=' + encodeURIComponent(data.branch || ''))
          .then(r => r.json())
          .then(gh => {
            setGithubAutolink(gh);
            render();
          })
          .catch(() => { setGithubAutolink(null); render(); });
      } else {
        setGithubAutolink(null);
        render();
      }
    });
}

let currentGithubRepo = null;
let currentGithubOrigin = null;
let currentPR = null;
let currentCwd = null;

function setGithubAutolink(gh) {
  currentGithubRepo = (gh && gh.upstream) || (gh && gh.origin);
  currentGithubOrigin = (gh && gh.origin) || (gh && gh.upstream);
  currentPR = gh && gh.pr;
}

function linkifyGithub(html) {
  if (currentGithubRepo) {
    html = html.replace(/(^|[>\s(])#(\d+)\b/g, function(match, before, id) {
      var url = 'https://github.com/' + currentGithubRepo + '/pull/' + id;
      return before + '<a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">#' + id + '</a>';
    });
  }
  html = html.replace(/<code>([0-9a-f]{7})<\/code>/g, function(match, sha) {
    var link = '<code><a href="#" class="git-show-link" data-sha="' + sha + '">' + sha + '</a></code>';
    if (currentGithubRepo) {
      var url = 'https://github.com/' + currentGithubRepo + '/commit/' + sha;
      link += '<a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer" class="exticon" title="View on GitHub">&#x2197;</a>';
    }
    return link;
  });
  return html;
}

document.addEventListener('click', function(e) {
  var link = e.target.closest('.git-show-link');
  if (!link || !currentCwd) return;
  e.preventDefault();
  fetch('/api/terminal/run/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: ['git', '-c', 'core.pager=less -+F -R', 'show', link.dataset.sha], cwd: currentCwd})
  });
});

function renderMarkdown(text) {
  if (!text) return '';
  return linkifyGithub(marked.parse(text));
}

function renderToolInput(name, input) {
  var main = null;
  var skip = [];
  if (name === 'Read') {
    skip = ['file_path', 'offset', 'limit'];
    main = esc(input.file_path || '') +
      (input.offset ? ' :' + input.offset : '') +
      (input.limit ? ' (' + input.limit + ' lines)' : '');
  }
  if (name === 'Bash') {
    skip = ['command', 'description'];
    const desc = input.description ? '<div style="color:#888;font-size:11px">' + esc(input.description) + '</div>' : '';
    main = desc + '<code>' + esc(input.command || '') + '</code>';
  }
  if (name === 'ExitPlanMode') {
    var html = '';
    if (input.plan) {
      html += '<div class="plan-content">' + renderMarkdown(input.plan) + '</div>';
    }
    if (input.allowedPrompts && input.allowedPrompts.length) {
      html += '<div class="plan-prompts"><div class="plan-prompts-label">Allowed prompts:</div>';
      input.allowedPrompts.forEach(function(p) {
        html += '<div class="plan-prompt"><span class="plan-prompt-tool">' + esc(p.tool) + '</span> ' + esc(p.prompt) + '</div>';
      });
      html += '</div>';
    }
    if (input.planFilePath) {
      var planId = input.planFilePath.split('/').pop().replace(/\.md$/, '');
      html += '<div class="plan-file"><a href="/plans/' + esc(planId) + '" style="color:#6d28d9">' + esc(input.planFilePath) + '</a></div>';
    }
    return html || esc(JSON.stringify(input, null, 2));
  }
  if (name === 'EnterPlanMode') {
    return '<em>Entering plan mode...</em>';
  }
  if (main === null) return esc(JSON.stringify(input, null, 2));
  var extra = {};
  var hasExtra = false;
  for (var k in input) { if (skip.indexOf(k) === -1) { extra[k] = input[k]; hasExtra = true; } }
  if (hasExtra) main += '\n' + esc(JSON.stringify(extra, null, 2));
  return main;
}

function renderBlock(block) {
  if (block.type === 'text') {
    return '<div class="block text">' + renderMarkdown(block.text) + '</div>';
  }
  if (block.type === 'thinking') {
    return '<details class="block thinking"><summary>Thinking... <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>' + renderMarkdown(block.text) + '</details>';
  }
  if (block.type === 'tool_use') {
    if (block.name === 'ExitPlanMode') {
      return '<div class="block plan-block">' +
        '<div class="plan-header">Plan</div>' +
        renderToolInput(block.name, block.input) +
        '</div>';
    }
    if (block.name === 'EnterPlanMode') {
      return '<div class="block plan-enter">' + renderToolInput(block.name, block.input) + '</div>';
    }
    return '<div class="block tool_use">' +
      '<div class="tool-name">' + esc(block.name) + '</div>' +
      '<div class="tool-input">' + renderToolInput(block.name, block.input) + '</div>' +
      '</div>';
  }
  if (block.type === 'tool_result') {
    var html = '<details class="block tool_result">' +
      '<summary class="tool-name">' + esc(block.name || 'Result') + ' output <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>' +
      '<div class="tool-output">' + esc(block.output) + '</div>' +
      '</details>';
    if (block.subagent) {
      html += renderSubagent(block.subagent);
    }
    return html;
  }
  return '';
}

function renderSubagent(sub) {
  var label = (sub.agent_type || 'Agent') + (sub.description ? ': ' + sub.description : '');
  var html = '<details class="subagent"><summary>' + esc(label) + ' <span class="expand-all" title="Expand/collapse all">&#x29C9;</span></summary>';
  html += '<div class="subagent-messages">';
  sub.messages.forEach(function(m) {
    html += '<div class="message ' + m.role + '">';
    html += '<div class="role">' + esc(m.role) + '</div>';
    m.content.forEach(function(block) {
      html += renderBlock(block);
    });
    html += '</div>';
  });
  html += '</div></details>';
  return html;
}

function formatDuration(startIso, endIso) {
  try {
    const ms = new Date(endIso) - new Date(startIso);
    if (ms < 0 || isNaN(ms)) return '';
    const mins = Math.floor(ms / 60000);
    if (mins < 1) return '<1m';
    if (mins < 60) return mins + 'm';
    const hours = Math.floor(mins / 60);
    const remMins = mins % 60;
    if (hours < 24) return hours + 'h' + (remMins ? ' ' + remMins + 'm' : '');
    return Math.floor(hours / 24) + 'd ' + (hours % 24) + 'h';
  } catch(e) { return ''; }
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-CA') + ' ' + d.toLocaleTimeString('en-CA', {hour: '2-digit', minute: '2-digit', hour12: false});
  } catch(e) { return iso; }
}

function formatTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-CA') + ' ' + d.toLocaleTimeString('en-CA', {hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false});
  } catch(e) { return ''; }
}

mainEl.addEventListener('click', function(e) {
  if (!e.target.classList.contains('expand-all')) return;
  e.preventDefault();
  e.stopPropagation();
  const clicked = e.target.closest('details');
  if (!clicked) return;

  const willOpen = !clicked.open;
  mainEl.querySelectorAll('details').forEach(d => { d.open = willOpen; });

  e.target.closest('summary').scrollIntoView({ block: 'nearest' });
});

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
