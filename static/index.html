<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>contexts</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; display: flex; height: 100vh; }

#sidebar {
  width: 320px;
  min-width: 320px;
  border-right: 1px solid #ddd;
  overflow-y: auto;
  background: #f8f8f8;
}

#sidebar h2 {
  padding: 16px;
  font-size: 16px;
  border-bottom: 1px solid #ddd;
}

.conversation-item {
  padding: 12px 16px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.conversation-item:hover { background: #e8e8e8; }
.conversation-item.active { background: #d0d8ff; }

.conversation-item .project {
  font-size: 11px;
  color: #888;
  margin-bottom: 2px;
}

.conversation-item .date {
  font-size: 11px;
  color: #666;
  margin-bottom: 4px;
}

.conversation-item .blurb {
  font-size: 13px;
  color: #333;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

#main {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

#main .empty {
  color: #999;
  margin-top: 40vh;
  text-align: center;
}

.message {
  margin-bottom: 20px;
  max-width: 800px;
}

.message .role {
  font-size: 12px;
  font-weight: 600;
  color: #555;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.message.user .role { color: #2563eb; }
.message.assistant .role { color: #16a34a; }

.block {
  margin-bottom: 8px;
}

.block.text {
  font-size: 14px;
  line-height: 1.5;
  color: #222;
}

.block.text p { margin: 0.5em 0; }
.block.text p:first-child { margin-top: 0; }
.block.text p:last-child { margin-bottom: 0; }
.block.text pre { background: #f4f4f4; padding: 8px 12px; border-radius: 4px; overflow-x: auto; }
.block.text code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; font-size: 13px; }
.block.text pre code { background: none; padding: 0; }
.block.text ul, .block.text ol { margin: 0.5em 0; padding-left: 1.5em; }
.block.text h1, .block.text h2, .block.text h3 { margin: 0.75em 0 0.25em; }
.block.text h1 { font-size: 1.3em; }
.block.text h2 { font-size: 1.15em; }
.block.text h3 { font-size: 1em; }
.block.text blockquote { border-left: 3px solid #ddd; padding-left: 12px; color: #666; margin: 0.5em 0; }
.block.text table { border-collapse: collapse; margin: 0.5em 0; }
.block.text th, .block.text td { border: 1px solid #ddd; padding: 4px 8px; }
.block.text th { background: #f4f4f4; }

.block.thinking {
  white-space: pre-wrap;
  font-size: 13px;
  line-height: 1.4;
  color: #888;
  border-left: 3px solid #ddd;
  padding-left: 12px;
  font-style: italic;
}

.block.tool_use {
  font-size: 13px;
  background: #f0f4ff;
  border: 1px solid #d0d8f0;
  border-radius: 4px;
  padding: 8px 12px;
}

.block.tool_use .tool-name {
  font-weight: 600;
  color: #4338ca;
  margin-bottom: 4px;
}

.block.tool_use .tool-input {
  white-space: pre-wrap;
  font-family: monospace;
  font-size: 12px;
  color: #555;
  max-height: 200px;
  overflow-y: auto;
}

.block.tool_result {
  font-size: 13px;
  background: #f0faf0;
  border: 1px solid #c0e0c0;
  border-radius: 4px;
  padding: 8px 12px;
}

.block.tool_result .tool-name {
  font-weight: 600;
  color: #15803d;
  margin-bottom: 4px;
}

.block.tool_result .tool-output {
  white-space: pre-wrap;
  font-family: monospace;
  font-size: 12px;
  color: #555;
  max-height: 300px;
  overflow-y: auto;
}

details > summary {
  cursor: pointer;
  user-select: none;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="sidebar">
  <h2>Conversations <span id="close-btn" style="float:right;cursor:pointer;display:none;font-size:14px;color:#888" title="Close">&times;</span><span id="reload-btn" style="float:right;cursor:pointer;display:none;font-size:14px;color:#888;margin-right:8px" title="Reload">&#x21bb;</span></h2>
  <div id="conversation-list"></div>
</div>

<div id="main">
  <div class="empty">Select a conversation</div>
</div>

<script>
const listEl = document.getElementById('conversation-list');
const mainEl = document.getElementById('main');
const closeBtn = document.getElementById('close-btn');
const reloadBtn = document.getElementById('reload-btn');
let activeId = null;

// Load autolink patterns and register as a marked extension
fetch('/api/autolinks/')
  .then(r => r.json())
  .then(autolinks => {
    if (!autolinks.length) return;
    const reEscape = s => s.replace(/[.*+?^${}()|[\]\\\/]/g, '\\$&');
    const extensions = autolinks.map(al => {
      const name = 'autolink-' + al.prefix;
      const pre = reEscape(al.prefix);
      return {
        name: name,
        level: 'inline',
        start: function(src) { return src.match(new RegExp(pre))?.index; },
        tokenizer: function(src) {
          const match = src.match(new RegExp('^(' + pre + '(\\d+))'));
          if (match) {
            return { type: name, raw: match[0], text: match[1], id: match[2], url: al.url.replace('{id}', match[2]) };
          }
        },
        renderer: function(token) {
          return '<a href="' + esc(token.url) + '">' + esc(token.text) + '</a>';
        },
      };
    });
    marked.use({ extensions: extensions });
  });

closeBtn.onclick = function() {
  activeId = null;
  history.pushState(null, '', '/');
  document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
  mainEl.innerHTML = '<div class="empty">Select a conversation</div>';
  closeBtn.style.display = 'none';
  reloadBtn.style.display = 'none';
};

reloadBtn.onclick = function() {
  loadSidebar();
  if (activeId) loadConversation(activeId, false);
};

function loadSidebar() {
  fetch('/api/conversations/')
    .then(r => r.json())
    .then(conversations => {
      listEl.innerHTML = '';
      conversations.forEach(c => {
        const div = document.createElement('div');
        div.className = 'conversation-item';
        div.dataset.id = c.id;
        if (c.id === activeId) div.classList.add('active');

        const project = c.project.replace(/^\/home\/[^/]+\//, '~/');

        div.innerHTML =
          '<div class="project">' + esc(project) + '</div>' +
          '<div class="date">' + esc(formatDate(c.date)) + '</div>' +
          '<div class="blurb">' + esc(c.blurb) + '</div>';

        div.onclick = () => loadConversation(c.id);
        listEl.appendChild(div);
      });
    });
}

loadSidebar();

// open conversation from URL on initial load
const initMatch = location.pathname.match(/^\/conversations\/([^/]+)/);
if (initMatch) loadConversation(initMatch[1], false);

window.addEventListener('popstate', function(e) {
  const match = location.pathname.match(/^\/conversations\/([^/]+)/);
  if (match) {
    loadConversation(match[1], false);
  } else {
    activeId = null;
    closeBtn.style.display = 'none';
    reloadBtn.style.display = 'none';
    document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
    mainEl.innerHTML = '<div class="empty">Select a conversation</div>';
  }
});

function loadConversation(id, pushHistory) {
  activeId = id;
  closeBtn.style.display = 'inline';
  reloadBtn.style.display = 'inline';
  if (pushHistory !== false) {
    history.pushState({id: id}, '', '/conversations/' + id);
  }
  document.querySelectorAll('.conversation-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/conversations/' + id + '/')
    .then(r => r.json())
    .then(data => {
      if (activeId !== id) return;
      const render = () => {
        mainEl.innerHTML = '';
        data.messages.forEach(m => {
          const div = document.createElement('div');
          div.className = 'message ' + m.role;
          div.innerHTML = '<div class="role">' + esc(m.role) + '</div>';

          m.content.forEach(block => {
            div.innerHTML += renderBlock(block);
          });

          mainEl.appendChild(div);
        });
        mainEl.scrollTop = 0;
      };

      if (data.cwd) {
        fetch('/api/github-repo/?path=' + encodeURIComponent(data.cwd))
          .then(r => r.json())
          .then(gh => {
            setGithubAutolink(gh.repo);
            render();
          })
          .catch(() => { setGithubAutolink(null); render(); });
      } else {
        setGithubAutolink(null);
        render();
      }
    });
}

let currentGithubRepo = null;

function setGithubAutolink(repo) {
  currentGithubRepo = repo;
}

function linkifyGithub(html) {
  if (!currentGithubRepo) return html;
  return html.replace(/(^|[>\s(])#(\d+)\b/g, function(match, before, id) {
    var url = 'https://github.com/' + currentGithubRepo + '/pull/' + id;
    return before + '<a href="' + esc(url) + '">#' + id + '</a>';
  });
}

function renderMarkdown(text) {
  return linkifyGithub(marked.parse(text));
}

function renderBlock(block) {
  if (block.type === 'text') {
    return '<div class="block text">' + renderMarkdown(block.text) + '</div>';
  }
  if (block.type === 'thinking') {
    return '<details class="block thinking"><summary>Thinking...</summary>' + renderMarkdown(block.text) + '</details>';
  }
  if (block.type === 'tool_use') {
    const input = JSON.stringify(block.input, null, 2);
    return '<div class="block tool_use">' +
      '<div class="tool-name">' + esc(block.name) + '</div>' +
      '<div class="tool-input">' + esc(input) + '</div>' +
      '</div>';
  }
  if (block.type === 'tool_result') {
    return '<details class="block tool_result">' +
      '<summary class="tool-name">' + esc(block.name || 'Result') + ' output</summary>' +
      '<div class="tool-output">' + esc(block.output) + '</div>' +
      '</details>';
  }
  return '';
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  } catch(e) { return iso; }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
