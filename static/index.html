<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>contexts</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; display: flex; height: 100vh; }

#sidebar {
  width: 320px;
  min-width: 320px;
  border-right: 1px solid #ddd;
  overflow-y: auto;
  background: #f8f8f8;
}

#sidebar h2 {
  padding: 16px;
  font-size: 16px;
  border-bottom: 1px solid #ddd;
}

.conversation-item {
  padding: 12px 16px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.conversation-item:hover { background: #e8e8e8; }
.conversation-item.active { background: #d0d8ff; }

.conversation-item .project {
  font-size: 11px;
  color: #888;
  margin-bottom: 2px;
}

.conversation-item .date {
  font-size: 11px;
  color: #666;
  margin-bottom: 4px;
}

.conversation-item .blurb {
  font-size: 13px;
  color: #333;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

#main {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

#main .empty {
  color: #999;
  margin-top: 40vh;
  text-align: center;
}

.message {
  margin-bottom: 20px;
  max-width: 800px;
}

.message .role {
  font-size: 12px;
  font-weight: 600;
  color: #555;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.message.user .role { color: #2563eb; }
.message.assistant .role { color: #16a34a; }

.block {
  margin-bottom: 8px;
}

.block.text {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.5;
  color: #222;
}

.block.thinking {
  white-space: pre-wrap;
  font-size: 13px;
  line-height: 1.4;
  color: #888;
  border-left: 3px solid #ddd;
  padding-left: 12px;
  font-style: italic;
}

.block.tool_use {
  font-size: 13px;
  background: #f0f4ff;
  border: 1px solid #d0d8f0;
  border-radius: 4px;
  padding: 8px 12px;
}

.block.tool_use .tool-name {
  font-weight: 600;
  color: #4338ca;
  margin-bottom: 4px;
}

.block.tool_use .tool-input {
  white-space: pre-wrap;
  font-family: monospace;
  font-size: 12px;
  color: #555;
  max-height: 200px;
  overflow-y: auto;
}

.block.tool_result {
  font-size: 13px;
  background: #f0faf0;
  border: 1px solid #c0e0c0;
  border-radius: 4px;
  padding: 8px 12px;
}

.block.tool_result .tool-name {
  font-weight: 600;
  color: #15803d;
  margin-bottom: 4px;
}

.block.tool_result .tool-output {
  white-space: pre-wrap;
  font-family: monospace;
  font-size: 12px;
  color: #555;
  max-height: 300px;
  overflow-y: auto;
}

details > summary {
  cursor: pointer;
  user-select: none;
}
</style>
</head>
<body>

<div id="sidebar">
  <h2>Conversations</h2>
  <div id="conversation-list"></div>
</div>

<div id="main">
  <div class="empty">Select a conversation</div>
</div>

<script>
const listEl = document.getElementById('conversation-list');
const mainEl = document.getElementById('main');
let activeId = null;

fetch('/api/conversations/')
  .then(r => r.json())
  .then(conversations => {
    conversations.forEach(c => {
      const div = document.createElement('div');
      div.className = 'conversation-item';
      div.dataset.id = c.id;

      const project = c.project.replace(/^\/home\/[^/]+\//, '~/');

      div.innerHTML =
        '<div class="project">' + esc(project) + '</div>' +
        '<div class="date">' + esc(formatDate(c.date)) + '</div>' +
        '<div class="blurb">' + esc(c.blurb) + '</div>';

      div.onclick = () => loadConversation(c.id);
      listEl.appendChild(div);
    });
  });

function loadConversation(id) {
  activeId = id;
  document.querySelectorAll('.conversation-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  mainEl.innerHTML = '<div class="empty">Loading...</div>';

  fetch('/api/conversations/' + id + '/')
    .then(r => r.json())
    .then(data => {
      if (activeId !== id) return;
      mainEl.innerHTML = '';
      data.messages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'message ' + m.role;
        div.innerHTML = '<div class="role">' + esc(m.role) + '</div>';

        m.content.forEach(block => {
          div.innerHTML += renderBlock(block);
        });

        mainEl.appendChild(div);
      });
      mainEl.scrollTop = 0;
    });
}

function renderBlock(block) {
  if (block.type === 'text') {
    return '<div class="block text">' + esc(block.text) + '</div>';
  }
  if (block.type === 'thinking') {
    return '<details class="block thinking"><summary>Thinking...</summary>' + esc(block.text) + '</details>';
  }
  if (block.type === 'tool_use') {
    const input = JSON.stringify(block.input, null, 2);
    return '<div class="block tool_use">' +
      '<div class="tool-name">' + esc(block.name) + '</div>' +
      '<div class="tool-input">' + esc(input) + '</div>' +
      '</div>';
  }
  if (block.type === 'tool_result') {
    return '<details class="block tool_result">' +
      '<summary class="tool-name">' + esc(block.name || 'Result') + ' output</summary>' +
      '<div class="tool-output">' + esc(block.output) + '</div>' +
      '</details>';
  }
  return '';
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  } catch(e) { return iso; }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
